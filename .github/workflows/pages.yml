name: pages

on:
  push:
    branches: [main]
    paths:
      - "visuals/**"
      - "registry/**"
      - "docs/**"
      - "scripts/build_graph.py"
      - "scripts/build_matrices.py"
      - "scripts/compute_tier.py"
      - "scripts/compute_velocity.py"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

# Default job permissions: read-only. Each job widens as needed.
permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    # The build job only reads the repo and uploads an artefact. No Pages
    # token or OIDC id-token needed here — those scopes are confined to the
    # deploy job below.
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install package (dev extras)
        run: pip install -e ".[dev]"

      - name: Recompute tier overlay
        run: python scripts/compute_tier.py

      - name: Recompute uptake velocity
        run: python scripts/compute_velocity.py --rising

      - name: Rebuild matrices (keep matrix docs in sync with fresh tiers)
        run: python scripts/build_matrices.py

      - name: Rebuild graph payload (graph-data.json + graph.svg + graph.png)
        run: python scripts/build_graph.py

      - name: Assemble site
        run: |
          mkdir -p _site _site/docs
          cp visuals/index.html _site/index.html
          cp visuals/2d.html _site/2d.html
          cp visuals/graph-data.json _site/graph-data.json
          cp visuals/graph.svg _site/graph.svg
          cp visuals/graph.png _site/graph.png
          cp visuals/model-agnostic-spectrum.svg _site/model-agnostic-spectrum.svg
          cp visuals/five-component-overlay.svg _site/five-component-overlay.svg
          # Social-card / OpenGraph asset (referenced by visuals/index.html + 2d.html).
          cp visuals/hero.svg _site/hero.svg
          # Live-viewer screenshot used by the README. Copy under the same
          # subpath so absolute URLs resolve in both GitHub and Pages.
          mkdir -p _site/viewer-3d
          cp visuals/viewer-3d/preview.png _site/viewer-3d/preview.png
          cp README.md _site/README.md
          # Mirror docs/*.md so cross-links (sovereignty-rubric, adjacencies, rising) resolve.
          cp docs/*.md _site/docs/ 2>/dev/null || true

      - name: Upload artefact
        uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    # Deploy is the only job that needs the Pages token + OIDC id-token.
    # Confining these scopes here (rather than inheriting at workflow level)
    # is least-privilege per the GitHub Pages deployment guidance.
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
