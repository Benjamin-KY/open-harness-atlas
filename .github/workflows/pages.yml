name: pages

on:
  push:
    branches: [main]
    paths:
      - "visuals/**"
      - "registry/**"
      - "scripts/build_graph.py"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package (dev extras)
        run: pip install -e ".[dev]"

      - name: Rebuild graph payload (graph-data.json + graph.svg + graph.png)
        run: python scripts/build_graph.py

      - name: Assemble site
        run: |
          mkdir -p _site
          cp visuals/index.html _site/index.html
          cp visuals/graph-data.json _site/graph-data.json
          cp visuals/graph.svg _site/graph.svg
          cp visuals/graph.png _site/graph.png
          cp visuals/model-agnostic-spectrum.svg _site/model-agnostic-spectrum.svg
          cp visuals/taxonomy.svg _site/taxonomy.svg
          cp visuals/five-component-overlay.svg _site/five-component-overlay.svg
          cp README.md _site/README.md

      - name: Upload artefact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
