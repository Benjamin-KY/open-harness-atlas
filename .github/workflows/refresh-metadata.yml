name: refresh-metadata
on:
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Refresh metadata sidecars
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/refresh_metadata.py

      - name: Recompute tier overlay
        run: python scripts/compute_tier.py

      - name: Recompute uptake velocity (+ docs/rising.md)
        run: python scripts/compute_velocity.py --rising

      - name: Rebuild matrices (must be in sync with new tiers)
        run: python scripts/build_matrices.py

      - name: Validate registry after refresh
        run: python scripts/validate_registry.py

      # The default GITHUB_TOKEN cannot *open* a pull request unless the repo
      # setting "Allow GitHub Actions to create and approve pull requests" is
      # enabled — and that same toggle also lets Actions *approve* PRs, which
      # we deliberately do not want (it weakens the review boundary). Rather
      # than loosen that boundary, we push the drift to a dedicated bot branch
      # and surface a ready-to-click compare link in the run summary. A human
      # still opens and merges the PR, preserving review of any unexpected
      # archived/SPDX changes. This path needs only `contents: write`.
      - name: Push drift to bot branch
        id: drift
        run: |
          if [ -z "$(git status --porcelain)" ]; then
            echo "No metadata drift since last refresh — nothing to push."
            echo "drift=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "drift=true" >> "$GITHUB_OUTPUT"
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -B bot/refresh-metadata
          git add -A
          git commit -m "chore(metadata): weekly sidecar refresh"
          git push --force origin bot/refresh-metadata

      - name: Summarise drift in run output
        if: steps.drift.outputs.drift == 'true'
        run: |
          {
            echo "## Weekly metadata refresh — drift detected"
            echo ""
            echo "The auto-managed \`registry/_metadata/*.json\` sidecars changed."
            echo "They have been pushed to branch \`bot/refresh-metadata\`."
            echo ""
            echo "**Open the review PR:**"
            echo "<https://github.com/${{ github.repository }}/compare/main...bot/refresh-metadata?expand=1>"
            echo ""
            echo "Only sidecar JSON is touched — hand-curated YAML is never modified."
            echo "Review for unexpected \`archived: true\` flags or SPDX mismatches."
          } >> "$GITHUB_STEP_SUMMARY"
