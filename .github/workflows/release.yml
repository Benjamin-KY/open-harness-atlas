name: release
on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package (dev extras)
        run: pip install -e ".[dev]"

      - name: Validate registry
        run: python scripts/validate_registry.py

      - name: Pytest
        run: pytest -q

      - name: Rebuild visuals
        run: python scripts/build_visuals.py

      - name: Rebuild matrices
        run: python scripts/build_matrices.py

      - name: Confirm no working-tree drift
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::Generated artefacts drifted at release. Commit them and re-tag."
            git status --short
            exit 1
          fi

      - name: Bundle visuals for release asset
        run: |
          mkdir -p dist
          tar -czf dist/open-harness-atlas-visuals-${GITHUB_REF_NAME}.tar.gz visuals/
          tar -czf dist/open-harness-atlas-matrices-${GITHUB_REF_NAME}.tar.gz docs/*-matrix.md

      - name: Attach artefacts to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/open-harness-atlas-visuals-*.tar.gz
            dist/open-harness-atlas-matrices-*.tar.gz
