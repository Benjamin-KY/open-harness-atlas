name: validate
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Install package (dev extras)
        run: pip install -e ".[dev]"

      - name: Validate registry
        run: python scripts/validate_registry.py

      - name: Pytest
        run: pytest -q

      - name: Lint with ruff
        run: ruff check scripts tests

      - name: Tier overlay is up to date (no drift)
        run: python scripts/compute_tier.py --check

      - name: Uptake velocity + rising.md are up to date (no drift)
        run: python scripts/compute_velocity.py --rising --check

      - name: Matrices are up to date
        run: python scripts/build_matrices.py --check

      - name: Visuals (SVG + PNG) are up to date
        run: python scripts/build_visuals.py --check
