name: validate
on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package (dev extras)
        run: pip install -e ".[dev]"

      - name: Validate registry
        run: python scripts/validate_registry.py

      - name: Pytest
        run: pytest -q

      - name: Check matrices are up to date
        run: python scripts/build_matrices.py --check
