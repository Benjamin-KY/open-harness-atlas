# open-harness-atlas — use-case lens (entry points)
# ----------------------------------------------------------------------------
# Curator-maintained "I need a harness for…" map.
#
# Drives the viewer's entry-point overlay (companion/use_cases.json,
# generated by scripts/build_use_cases.py and shipped inside graph-data.json).
#
# Editing rules:
#   * `id` is kebab-case, stable, used as filter key in the viewer URL.
#   * `featured` IDs are surfaced first (recommended starting points,
#     usually 4–8 entries). Order matters: most-recommended first.
#   * `recommended` IDs broaden the set (usually 8–20 entries) for the
#     "see more" tier.
#   * `auto_match` is OPTIONAL — when present, every registry entry whose
#     category is in `categories` AND whose subcategory is in
#     `subcategories` (if specified) is added to the use-case automatically.
#     Use `auto_match` to keep long-tail coverage without churning this
#     file on every new entry. The viewer marks auto-matched entries with
#     a lighter visual treatment than featured/recommended ones.
#   * Every ID listed here MUST exist in the registry; validation fails
#     loudly otherwise (see scripts/validate_registry.py).
#
# Schema: companion/_use_cases.schema.yaml
# ----------------------------------------------------------------------------

version: 1

use_cases:

  - id: evaluate-llm
    name: "Evaluate an LLM"
    icon: "📊"
    short: "Run benchmarks, regression suites, or LLM-as-judge scoring against a model."
    description: |
      Score a model — public benchmarks (MMLU, HumanEval, ARC-AGI), task-specific
      eval suites, A/B comparison, or LLM-as-judge pipelines. Pair with a
      governance entry below if you need policy-gated regression.
    featured:
      - lm-evaluation-harness
      - deepeval
      - promptfoo
      - opencompass
      - ragas
    recommended:
      - mt-bench
      - swe-bench
      - arc-agi
      - livebench
      - openai-preparedness
      - metr-task-standard
    auto_match:
      categories: [eval]

  - id: redteam-chatbot
    name: "Red-team a chatbot"
    icon: "🛡️"
    short: "Adversarial probes, jailbreak suites, agentic attack simulators."
    description: |
      Find unsafe outputs before users do — prompt-injection, jailbreaks,
      agentic exfiltration, prompt-leak, tool misuse. Run continuously in
      CI; the best harnesses ship taxonomies plus generators.
    featured:
      - garak
      - pyrit
      - giskard
      - agentdojo
    recommended:
      - rebuff
      - llm-attacks
      - strong-reject
      - promptfoo
    auto_match:
      categories: [redteam]

  - id: monitor-production-agents
    name: "Monitor production agents"
    icon: "📈"
    short: "Trace, log, score, alert — observability for LLM-powered systems."
    description: |
      Capture every prompt/response, attach evaluator scores, watch for
      drift, route traces by tenant. Most are OTEL-compatible.
    featured:
      - langfuse
      - arize-phoenix
      - opik
      - openllmetry
    recommended:
      - helicone
      - portkey-gateway
      - litellm
      - mlflow-ai-gateway

  - id: build-rag-agent
    name: "Build a RAG agent"
    icon: "🧠"
    short: "Compose retrieval, reasoning, and tool-use into an agent."
    description: |
      An agent framework plus its supporting cast — retrievers, schedulers,
      planners, tool routers. Most landmark frameworks bring all of these;
      smaller ones specialise.
    featured:
      - langgraph
      - langchain
      - llama-index-agents
      - haystack
      - dspy
    recommended:
      - crewai
      - autogen
      - smolagents
      - agno
      - camel
    auto_match:
      categories: [agent]

  - id: serve-inference
    name: "Serve LLM inference"
    icon: "⚙️"
    short: "Stand up an OpenAI-compatible endpoint on your own hardware."
    description: |
      Self-host inference — vLLM/sglang/TGI for high-throughput GPU,
      llama.cpp/ollama for laptops, BentoML/TensorRT-LLM for production.
      Pair with a routing layer if you need provider failover.
    featured:
      - vllm
      - sglang
      - ollama
      - llama-cpp
    recommended:
      - tensorrt-llm
      - bentoml
      - huggingface-tgi
      - lmdeploy
      - localai
      - jan
    auto_match:
      categories: [routing]

  - id: route-multi-provider
    name: "Route between providers"
    icon: "🔀"
    short: "One API, many models — failover, cost routing, A/B, tenant policy."
    description: |
      A gateway in front of OpenAI/Anthropic/local — for cost routing,
      failover, tenant-keyed policy, rate-limit safety. Most also do
      tracing and caching.
    featured:
      - litellm
      - portkey-gateway
      - helicone
      - gateway
    recommended:
      - one-api
      - new-api
      - apache-apisix
      - kong
      - higress
      - kgateway

  - id: govern-llm-policy
    name: "Govern LLM policy"
    icon: "🧷"
    short: "Validators, guardrails, structured outputs, audit-log FSMs."
    description: |
      Enforce the five components — schema-validate outputs, gate
      side-effects, redact PII, log the FSM. The strongest entries are
      validator-first (Pydantic-style) rather than prompt-asks-please.
    featured:
      - guardrails-ai
      - nemo-guardrails
      - instructor
      - outlines
      - baml
    recommended:
      - guidance
      - llm-guard
      - huggingface-trl
    auto_match:
      categories: [governance]

  - id: learn-the-stack
    name: "Learn the stack"
    icon: "🎓"
    short: "Cookbooks, courses, from-scratch implementations, paper notebooks."
    description: |
      Curated learning paths — first-principles ("LLMs from scratch"),
      official cookbooks (Anthropic / OpenAI / Mistral), and annotated
      paper repos. Start here if you're new.
    featured:
      - rasbt-llms-from-scratch
      - anthropic-prompt-eng-tutorial
      - openai-cookbook
      - anthropics-courses
      - dair-prompt-engineering-guide
    recommended:
      - mlabonne-llm-course
      - karpathy-nanogpt
      - handson-ml3
      - labmlai-annotated-dl
      - ai-engineering-hub
    auto_match:
      categories: [education]
