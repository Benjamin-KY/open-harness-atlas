sovereignty_notes: 'SylphAI is US-incorporated; AdalFlow is MIT-licensed and fully

  self-hostable. Multi-provider on both the LLM side

  (OpenAI / Anthropic / Google / Groq / Together / Ollama /

  vLLM / OpenAI-compatible endpoints) and the embedding side

  (OpenAI / Cohere / HF / Ollama). No call-home by default. The

  auto-optimisation loop is local — it issues training-call traffic

  against whichever provider the operator configures.

  '
