sovereignty_notes: 'CopilotKit (company, US — formal sponsor: github.com/copilotkit/copilotkit, with the AG-UI org as the protocol''s home) publishes AG-UI under MIT as an open, lightweight, event-based protocol (~16 standard event types) for agent↔frontend interaction, plus a reference HTTP implementation, default connector and middleware. Positioned as complementary to MCP (tools) and A2A (agent↔agent), with first-party integrations spanning LangGraph and CrewAI and a longer list of supported frameworks. Model-agnostic 3 is correct for a transport-level protocol layer that is intentionally orthogonal to model choice.'
