tagline: "Model Context Protocol server for arXiv — let agents search, download, and read academic papers via MCP tool calls."
description: |
  arxiv-mcp-server is an MCP server exposing arXiv search and paper retrieval as MCP tools. Any MCP-aware agent can query arXiv, download PDFs, and consume the extracted text without needing a custom arXiv integration. Useful for research-assistant agents and literature-review workflows where the agent needs structured access to a scholarly corpus.

  In the atlas: arxiv-mcp-server is catalogued on the agent / mcp-server shelf alongside mcp-playwright (browser), mobile-mcp (mobile), markdownify-mcp (content), and the Microsoft MCP catalogue. The named-MCP-server entries collectively document the tool-provisioning layer of the agentic stack.
