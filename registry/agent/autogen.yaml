tagline: Microsoft Research's multi-agent conversation framework — agents talk to each other to solve tasks.
description: |
  AutoGen is Microsoft Research's MIT-licensed framework for building
  multi-agent systems where agents converse with each other to solve
  tasks. The v0.4+ rewrite is async-first, with explicit agent
  classes (`AssistantAgent`, `UserProxyAgent`, custom), group chat
  managers, and a clean separation between **AgentChat** (high-level
  conversation patterns) and **Core** (low-level agent runtime).

  In the atlas: AutoGen is the canonical example of an
  **multi-agent-conversation** framework. The conversation idiom is
  useful for problems that benefit from explicit critic / writer /
  reviewer roles. As with all agent frameworks, pair with a governance
  harness for output contracts.
