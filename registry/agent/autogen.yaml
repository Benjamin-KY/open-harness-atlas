sovereignty_notes: |
  Microsoft Research, MIT-licensed, fully self-hostable. Multi-provider
  via the v0.4 `ChatCompletionClient` abstraction — OpenAI / Anthropic /
  Azure / OpenAI-compatible local backends all supported through
  configuration. Conservative model-agnostic 4 because conversation
  patterns sometimes need per-provider prompt tuning for reliable
  termination behaviour.
