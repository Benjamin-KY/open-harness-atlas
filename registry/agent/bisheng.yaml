  Apache-2.0; self-hosted Docker / Kubernetes deployment. Multi-provider on LLM side (OpenAI / Tongyi / Moonshot / DeepSeek / Ollama / vLLM / any OpenAI-compatible endpoint). No call-home in normal operation; hosted variant is separate and optional.
