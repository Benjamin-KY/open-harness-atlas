tagline: "Open LLMops platform for enterprise AI applications — visual workflow builder, agent runtime, knowledge base, and deployment management."
description: |
  BISHENG is an end-to-end LLMops platform that bundles a visual workflow / agent builder, RAG knowledge bases, model router, evaluation surface, and deployment / monitoring panels behind a single self-hostable application. Designed for enterprise teams that need both the no-code surface for business users and the operator-grade governance controls (versioning, role-based access, audit logs) for deployment.

  In the atlas: BISHENG is catalogued under agent / agent-platform alongside Dify and Flowise — distinct from agent *frameworks* (LangChain, LlamaIndex) by being a full deployable platform with UI and admin surface, not a library.
