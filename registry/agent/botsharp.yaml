sovereignty_notes: SciSharp (community; .NET open-source ML/AI Organization that also publishes NumSharp / TensorFlow.NET) ships BotSharp under Apache-2.0 as a cross-platform .NET multi-agent framework with plugin-based decoupling, conversation & state management, multi-LLM planning, MCP integration, built-in RAG with memory-based vector search, and rich-content channel adapters (Messenger, Slack, Telegram). Model-agnostic 3 fits the listed providers (ChatGPT 3.5 / 4o / o1, Gemini 2, Llama 3, Claude Sonnet 3.5, DeepSeek V3, HuggingFace) with HuggingFace as the local-capable path; provider is selected through the LLM Provider abstraction. SvelteKit admin UI (`BotSharp-UI`) is a sibling repo.
