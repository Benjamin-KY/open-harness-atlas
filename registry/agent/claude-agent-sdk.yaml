sovereignty_notes: |
  Anthropic-maintained, MIT-licensed, self-hostable as a Python package.
  The SDK itself is provider-locked to Anthropic Claude — `model_agnostic_score: 1`
  reflects this. Cross-provider use requires wrapping with a routing
  layer (LiteLLM, RouteLLM, Aisuite) or rewriting against a different
  agent SDK. The Fable / Mythos recall is the canonical worked example
  of why pinning to a single provider is a sovereignty risk.
