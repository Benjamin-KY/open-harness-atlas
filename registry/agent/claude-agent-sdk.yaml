tagline: Anthropic's MIT-licensed agent SDK with declarative tool definitions and bounded agentic loops.
description: |
  Claude Agent SDK is Anthropic's MIT-licensed Python SDK for building
  agentic loops on top of the Claude API. Tools are declared as
  dict-based schemas (compatible with Anthropic's native tool-use
  protocol), agents iterate model calls and tool executions until the
  model emits a final response, and streaming is supported via the
  Anthropic SDK's `messages.stream()` interface.

  In the atlas: Claude Agent SDK is the **provider-native** reference
  for Anthropic-side development. The 2026-06-13 Fable / Mythos
  recall is a vivid demonstration of why an Anthropic-only agent loop
  is a sovereignty risk — the SDK is included here on technical merit,
  but operators are explicitly counselled (see
  [`docs/fable-mythos-pattern-fire.md`](../../docs/fable-mythos-pattern-fire.md))
  to wrap it in a routing layer (LiteLLM / RouteLLM) so the same
  agent code can target a non-Anthropic backend on short notice.
