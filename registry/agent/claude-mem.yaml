sovereignty_notes: thedotmack is a single community maintainer (GitHub User owner) shipping claude-mem under Apache-2.0; the persistent-memory layer is OSS and self-hostable via npx install across multiple AI CLIs (Claude Code, Gemini CLI, OpenCode) plus OpenClaw gateway integration. Model-agnostic 3 — AI provider configuration is plug-in via OpenClaw and the host CLI's own provider list (multi-provider including local options via OpenClaw routing), but the compression worker still relies on whatever provider the host environment supplies rather than a uniform provider-abstraction API. Privacy posture is notable (local SQLite + Chroma store, `<private>` tag for redaction).
