sovereignty_notes: |
  Added 2026-06-15 via the v0.4.0 fresh-discovery sweep (8 gh-search topic queries, OSI-license filter, anti-laziness cross-reference against the existing 838 yaml files for both simple-id and owner-disambiguator collisions).
  Apache-2.0; self-hosted Docker / Kubernetes stack. Multi-provider on LLM and embedding sides. Archived, so will trigger data_missing once sidecar staleness exceeds 60 days — intended behaviour. Catalogued under the new archived-but-historically-significant pattern, similar to huggingface-tgi.
