tagline: "Modular open-source RAG framework for production — archived 2026-03 reference implementation of the layered-RAG-platform pattern."
description: |
  Cognita is a modular RAG framework intended for production deployments. Separates the indexing, retrieval, and answer-generation layers behind versioned APIs so each can be swapped independently. Ships with reference UIs for document upload, evaluation, and operator-facing chat. Repository was archived 2026-03 after TrueFoundry refocused on its hosted platform; OSS reference remains useful.

  In the atlas: Cognita is catalogued alongside RAGFlow, Verba, DocsGPT, and R2R on the RAG-platform shelf. Even though archived, it is referenced from active forks and discussed in the production-RAG literature as a clean example of the layered-API pattern, so it stays in the catalogue as a reference implementation rather than a live-maintained product.
