sovereignty_notes: |
  Added 2026-06-15 via the v0.4.0 fresh-discovery sweep (8 gh-search topic queries, OSI-license filter, anti-laziness cross-reference against the existing 838 yaml files for both simple-id and owner-disambiguator collisions).
  MIT; can be self-hosted or used as a managed Composio service. Self-hosted mode runs the auth broker locally with the operator's own OAuth credentials per integration — no Composio.dev dependency in that posture. Hybrid posture because the easy path is the hosted broker, but the OSS deliverable is fully sufficient for a local-only deployment.
