tagline: "Open-source toolset, authentication, and tool-call router for AI agents — 100+ pre-built integrations behind a single agent-friendly API."
description: |
  Composio is a tool-router and integration layer for AI agents. Ships 100+ pre-built integrations (GitHub, Slack, Gmail, Notion, Linear, Salesforce, and so on) with managed OAuth, scoped token issuance, and a uniform tool-call schema that any agent framework can consume. Designed to solve the per-integration auth-and-rate-limit boilerplate that otherwise dominates agent-tool implementation.

  In the atlas: Composio is catalogued under agent / tool-router alongside MCP servers (which expose individual tool surfaces) and direct-integration approaches. Differentiator is the unified-auth layer — operators who would otherwise need to wire up dozens of per-provider OAuth flows get a single config surface.
