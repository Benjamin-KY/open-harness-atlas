primary_language: TypeScript

tagline: "Open-source code AI assistant for VS Code / JetBrains — bring-your-own model."

description: |
  Continue is an open-source IDE extension (VS Code + JetBrains) that turns any LLM into a code assistant. Chat, autocomplete, edit-in-place, and agent-mode actions, all configurable to the user's choice of model.

  In the atlas: the OSS BYO-model alternative to GitHub Copilot / Cursor. Peer to `aider`, `cline`; differentiator is the deep IDE integration and the config-driven multi-provider setup.

