model_agnostic_score: 5

sovereignty_notes: |
  Added 2026-06-14 via the awesome-list discovery sweep (GraphQL-batched parser; >= 2-list endorsement).
  Apache-2.0; runs locally as an IDE extension. Model provider is fully operator-controlled — supports OpenAI, Anthropic, Bedrock, Azure, Ollama, vLLM, LM Studio, llama.cpp, etc. The IDE extension itself does not phone home (telemetry is opt-in and documented).

