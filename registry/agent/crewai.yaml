tagline: Role-based multi-agent orchestration — Agents with goals and roles execute
  Tasks within a Crew.
description: 'CrewAI models problems as a **Crew** of role-specialised **Agents**

  who execute **Tasks** in sequence or in parallel under a process

  manager. Each Agent has a role, goal, backstory, and tool set;

  Tasks are typed with expected_output and assigned to specific Agents.

  The Crew runs the orchestration loop, handles delegation, and

  composes the final output. It also ships **Flows** — deterministic

  state-machine workflows that can call into Crews when needed.


  In the atlas: CrewAI is the canonical example of a **role-based

  multi-agent** framework. The Crew/Task abstraction is useful when

  problems decompose into independent specialist sub-tasks. Like other

  agent frameworks, pair with a governance harness for output contracts

  and citation discipline.

  '
