sovereignty_notes: |
  Added 2026-06-15 via the v0.4.0 fresh-discovery sweep (8 gh-search topic queries, OSI-license filter, anti-laziness cross-reference against the existing 838 yaml files for both simple-id and owner-disambiguator collisions).
  Apache-2.0; Python library / service. Vector backend is operator-pluggable (Milvus / Zilliz Cloud / Qdrant / Weaviate / Chroma). LLM is operator-pluggable (OpenAI / Anthropic / Ollama / vLLM / any OpenAI-compatible endpoint). No call-home in normal operation.
