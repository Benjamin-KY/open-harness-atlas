model_agnostic_score: 4

sovereignty_notes: |
  Added 2026-06-14 via the recency-biased discovery sweep. MIT-
  licensed, self-hostable. Backend abstraction supports OpenAI-
  compatible endpoints (Ollama, vLLM, SGLang) alongside vendor
  APIs. Skywork AI is a China-based company; users with
  jurisdictional concerns should review provider configuration
  and any defaults that point at vendor endpoints. The framework
  itself runs entirely inside the user's process.

