id: deepresearchagent
name: DeepResearchAgent

category: agent
subcategory: multi-agent

repo_url: https://github.com/SkyworkAI/DeepResearchAgent
homepage: https://skyworkai.github.io/DeepResearchAgent/

license: MIT
primary_language: Python

tagline: Hierarchical multi-agent framework for deep research and general-purpose task solving.

description: |
  DeepResearchAgent is a hierarchical multi-agent system: a
  top-level planning agent decomposes a research goal into
  sub-tasks and coordinates specialised lower-level agents
  (search, summarise, synthesise, fact-check). Designed for
  deep-research workloads but generalises to other planning-
  heavy task families.

  In the atlas: a planner-coordinator-worker shape complementing
  `crewai`, `autogen`, and `metagpt` as alternatives at the
  multi-agent layer; closest in design intent to `metagpt`'s
  role-based decomposition. Pairs with a retrieval layer
  (haystack / llama-index) and an eval harness for the research
  outputs.

maturity: beta

