sovereignty_notes: |
  Added 2026-06-14 via the awesome-list discovery sweep (GraphQL-batched parser; >= 2-list endorsement).
  MIT licence; self-hosted (Python + a small web UI). Configurable across Claude, GPT-4, Ollama, Mistral, etc. Browser actions go through Playwright on the host; no managed-service dependency.

