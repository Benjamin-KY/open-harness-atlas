tagline: "Open-source agentic software engineer — plans, codes, executes whole engineering tasks."

description: |
  Devika is an autonomous software-engineering agent that decomposes a high-level objective into a plan, writes code, browses for documentation, and iterates against test feedback. Web UI plus an LLM-agnostic back end.

  In the atlas: peer to `openhands`, `swe-agent`, `gpt-engineer`, `metagpt`. Differentiator is the interactive UI and explicit planning trace.

