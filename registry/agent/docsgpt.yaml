sovereignty_notes: |
  Added 2026-06-15 via the v0.4.0 fresh-discovery sweep (8 gh-search topic queries, OSI-license filter, anti-laziness cross-reference against the existing 838 yaml files for both simple-id and owner-disambiguator collisions).
  MIT; self-hostable Docker stack. Multi-provider on the LLM side (OpenAI, Anthropic, local Ollama / llama.cpp, HF Inference Endpoints, custom). The hosted docsgpt.cloud is optional; the OSS bundle is a complete deployable platform with no call-home in normal operation.
