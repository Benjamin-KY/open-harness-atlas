description: |
  DocsGPT is a self-hostable AI platform for documentation Q&A, deep-research, and document-analysis workflows. Ships an agent-builder UI, browser-based deep-research surface, and a hosted-or-local model layer. Originally a documentation-focused chatbot, the 2024-2026 line expanded into an agent platform with tool calling and multi-step research loops.

  In the atlas: DocsGPT is catalogued alongside other end-to-end RAG / agent platforms (RAGFlow, Verba, Cognita, R2R, khoj). Differentiator is the explicit agent-builder UI for non-developer operators — closer to a tool than a framework.
