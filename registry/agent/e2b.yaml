license: Apache-2.0
primary_language: Python

tagline: "Open-source sandbox runtime for AI-agent code execution."

description: |
  E2B is a sandbox runtime for AI agents that need to execute LLM-generated code safely. Provides Firecracker / Cloud Hypervisor microVMs with per-session isolation, filesystem snapshots, and language-runtime templates (Python, Node, custom).

  In the atlas: the cloud / managed-microVM counterpart to `sandlock` (local process sandbox) and `daytona`. Critical primitive for the `audit-log-fsm-escalation` pattern's tool layer.

