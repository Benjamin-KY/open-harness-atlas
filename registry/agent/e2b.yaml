sovereignty_notes: |
  Added 2026-06-14 via the awesome-list discovery sweep (GraphQL-batched parser; >= 2-list endorsement).
  Apache-2.0; can be run either as the managed E2B cloud (api.e2b.dev) OR self-hosted via the open-source runtime on the operator's own hardware. The self-host path keeps all code-execution traffic in-tenancy. Posture noted as `hybrid` to reflect both deployment modes.

