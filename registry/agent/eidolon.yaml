description: |
  Eidolon is Eidolon AI's service-oriented agent SDK where each agent is a deployable HTTP service with OpenAPI schema. Agents-as-services pattern: automatic REST API per agent; dynamic agent-to-agent tool calls.

  In the atlas: Eidolon is an agent-orchestration entry. The harness paradigm reads agent frameworks as the policy + tool-routing layer that sits between intent and the model tier.
