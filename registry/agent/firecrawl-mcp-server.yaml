sovereignty_notes: |-
  Firecrawl Inc (US-incorporated commercial company); the MCP server itself is MIT-licensed,
  but the default code path calls Firecrawl's commercial cloud API (api.firecrawl.dev) which
  requires an API key and is not OSS. A self-hostable Firecrawl backend exists
  (github.com/firecrawl/firecrawl, AGPLv3) and the MCP server accepts a custom base URL, so
  full self-sovereignty is possible but requires standing up the OSS Firecrawl service
  separately. Model-agnostic 3 — multi-provider via the MCP-client side; the scraping tier
  itself is provider-agnostic. Curator note (2026-06-14): catalogued because of the OSS
  self-host path; defaults bias toward the commercial cloud API.
