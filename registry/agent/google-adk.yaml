tagline: Google's Apache-2.0 agent SDK with FunctionTool, Gemini-native tool use, and async runners.
description: 'Google ADK is the Apache-2.0 Python SDK from Google for building

  agentic systems on top of Gemini and other supported backends.

  Tools are wrapped with `FunctionTool`, agents are declared with

  instructions + a tool list, and the `Runner.run_async()` loop

  handles the model-native tool-use cycle.


  In the atlas: Google ADK is the **provider-native** reference for

  Gemini-side development. Like Claude Agent SDK and OpenAI Agents

  SDK, the same sovereignty caution applies — wrap the SDK in a

  routing layer if the deployment must survive provider-side disruption.

  '
