sovereignty_notes: 'Google-maintained, Apache-2.0, self-hostable as a Python package.

  Primary target is Gemini (via API key or Vertex AI); additional

  backends are supported via the same configuration but the integration

  is less mature. Model-agnostic 2 — provider-locked posture in

  practice despite formally supporting alternatives.

  '
