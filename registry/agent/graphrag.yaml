sovereignty_notes: |
  Added 2026-06-15 via the v0.4.0 fresh-discovery sweep (8 gh-search topic queries, OSI-license filter, anti-laziness cross-reference against the existing 838 yaml files for both simple-id and owner-disambiguator collisions).
  MIT; Python library; runs locally. The original cost-intensive prompt-heavy entity extraction can be a deployment consideration — operators with budget constraints typically use lightrag for similar semantics at lower indexing cost. LLM is operator-supplied; default OpenAI integrations are easily swapped for any OpenAI-compatible endpoint. Repository is currently SAML-blocked for non-Microsoft GitHub OAuth tokens, so the refresh-metadata bot can't update its sidecar from this fork's CI; expected — the catalogue treats microsoft/* as gracefully-degraded data_missing entries (see HANDOVER gotcha #2).
