tagline: "Modular graph-based retrieval-augmented generation — the original GraphRAG reference implementation from Microsoft Research."
description: |
  Microsoft GraphRAG is the reference implementation of the graph-augmented RAG approach: extract entities and relationships from a corpus into a knowledge graph, run community detection over the graph, generate community summaries, and combine entity-level retrieval with community-level summarisation at query time. The result is a retrieval surface that handles 'global' questions (where the answer requires synthesising across the whole corpus) that flat vector RAG struggles with.

  In the atlas: graphrag is the originating point on the graph-augmented retrieval shelf — peers include lightrag (lighter index construction) and r2r (production-grade agentic RAG). Microsoft also ships a hosted variant; this entry catalogues the self-hostable OSS reference.
