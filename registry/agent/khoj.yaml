  AGPL-3.0; self-hostable Docker / Kubernetes deployment. Multi-provider on LLM side (OpenAI / Anthropic / Ollama / vLLM / any OpenAI-compatible endpoint). No call-home in normal operation. Hosted khoj.dev is optional and separate.
