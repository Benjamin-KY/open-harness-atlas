tagline: "Self-hostable AI second brain — get answers from the web or local documents, build custom agents, schedule automations."
description: |
  Khoj is a self-hostable personal-assistant platform combining web search, local-document Q&A, agent building, and scheduled automations behind a chat UI. Operators run it on their own hardware and connect it to their own notes, files, mail, and calendars. The deliverable is a deployable application, not a framework.

  In the atlas: Khoj is catalogued on the agent / personal-assistant shelf alongside DocsGPT and the open second-brain projects. AGPL-3.0 carries the standard network-use copyleft trigger so anyone offering Khoj as a hosted service must publish their modifications.
