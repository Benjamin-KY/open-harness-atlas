sovereignty_notes: |
  Added 2026-06-15 via the v0.4.0 fresh-discovery sweep (8 gh-search topic queries, OSI-license filter, anti-laziness cross-reference against the existing 838 yaml files for both simple-id and owner-disambiguator collisions).
  MIT; embedded library (no daemon). Data lives entirely inside the operator's process and on local disk. No network surface. No call-home. Archived in October 2025; catalogued as a reference implementation of the embedded-graph-store pattern.
