tagline: "Embedded property graph database — Cypher support, vector and full-text search built in. Single-file local store for GraphRAG-style retrieval."
description: |
  Kuzu is an embedded property-graph database written in C++. Implements OpenCypher for graph queries with first-class vector and full-text indexes alongside graph traversal. Designed for use as an in-process store the way SQLite is used for relational data — single file on disk, embedded into the application process, no network service. The repository was archived in October 2025; active development continues under successor projects but this reference impl remains widely deployed.

  In the atlas: kuzu is catalogued under agent / graph-store as the embedded counterpart to neo4j-graphrag-python (which depends on a Neo4j server). Critical for GraphRAG-style retrieval stacks (graphrag, lightrag) that need a local-first graph + vector store without a separate database process.
