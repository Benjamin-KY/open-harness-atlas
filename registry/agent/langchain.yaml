repo_url: https://github.com/langchain-ai/langchain
homepage: https://docs.langchain.com/langchain/
license: MIT
primary_language: Python
tagline: Provider-agnostic Python/JS framework for chaining LLM calls, tools, retrievers,
  and agent loops; the de-facto reference implementation for the harness-as-application-layer
  pattern.
description: 'LangChain is a provider-agnostic framework (Python + JavaScript packages)
  that ships

  abstractions for LLM calls, prompt templates, chat models, embeddings, retrievers,

  document loaders, tools, output parsers, and agent loops. It includes adapters for

  100+ providers (OpenAI / Anthropic / Bedrock / Vertex / Ollama / vLLM / HuggingFace
  / etc.)

  and is intentionally swap-routable across them.


  In the atlas: this is an agent-orchestration entry. The harness paradigm reads agent

  frameworks as the policy + tool-routing layer that sits between intent and the model

  tier, and LangChain is the most-imitated reference for that layer.'
