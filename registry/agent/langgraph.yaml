license: MIT
primary_language: Python
tagline: Stateful, controllable agents as explicit graphs of nodes and edges — checkpointing and time-travel built in.
description: |
  LangGraph models agents as state-machine graphs: nodes are functions
  (LLM calls, tool calls, deterministic code) and edges are typed
  transitions (conditional, parallel, cyclic). The framework provides
  checkpointing (persist any state to a store), time-travel debugging
  (rewind and replay any node), human-in-the-loop interrupts, and
  streaming via `astream_events`. The pre-built `create_react_agent`
  is the easiest on-ramp.

  In the atlas: LangGraph is the canonical example of a **graph-state-
  machine** agent framework. The explicit-graph idiom maps directly to
  the Harmless Harnesses §5 audit-log + FSM-escalation invariant — the
  graph IS the FSM, so refusal and escalation are deterministic
  transitions rather than stochastic completions.
