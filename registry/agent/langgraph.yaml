sovereignty_notes: |
  LangChain is US-incorporated; LangGraph itself is MIT-licensed and
  fully self-hostable. Multi-provider via LangChain's `ChatModel`
  abstraction (OpenAI / Anthropic / Google / Cohere / Mistral / Ollama /
  vLLM / any OpenAI-compatible endpoint). LangSmith observability is a
  separate hosted product and entirely optional — LangGraph runs
  without it. Model-agnostic 4 because some node-level features
  (structured-output coercion, tool-result formatting) work best on
  specific provider tool-call dialects.
harness_paradigm_alignment: aligned
