sovereignty_notes: Langroid is a community-maintained Python multi-agent framework originating from CMU and UW-Madison researchers (Prasad Chalasani et al.), distributed under MIT. The runtime treats provider as a config string (OpenAI, Ollama, any OpenAI-compatible endpoint) with a MCP tool adapter — earning MAS=4 (OpenAI-compatible pluggable, local first-class via Ollama). Documented as in production at multiple companies (e.g., Nullify) and used in peer-reviewed ML4H 2024 work (MALADE pharmacovigilance system); 4k+ stars with active CI and Docker publishing.
