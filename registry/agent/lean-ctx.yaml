sovereignty_notes: 'yvgude (community individual maintainer on GitHub); Apache-2.0 Rust binary distributed via crates.io, npm (lean-ctx-bin), AUR and Pi.dev — runs entirely local with opt-in telemetry. Model-agnostic 3 — MCP-side integration so works with any tool-using agent over the MCP protocol regardless of model provider. Notable governance surface: routes/decides reads (policy_router), guards writes against allow-lists (source_authority), and emits a signed verifiable savings ledger (audit_log_fsm) — keeps the agent category but materially overlaps the governance spine.'
