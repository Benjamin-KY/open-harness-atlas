sovereignty_notes: |
  Added 2026-06-15 via the v0.4.0 fresh-discovery sweep (8 gh-search topic queries, OSI-license filter, anti-laziness cross-reference against the existing 838 yaml files for both simple-id and owner-disambiguator collisions).
  MIT; Python library; runs entirely locally. LLM and embedding model are operator-supplied — works with any OpenAI-compatible endpoint including local Ollama / vLLM. No call-home. The reference impl ships with multiple LLM and embedding adapters so the operator can swap providers without code changes.
