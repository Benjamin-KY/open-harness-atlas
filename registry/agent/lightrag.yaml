tagline: "Simple and fast graph-augmented retrieval — the EMNLP 2025 GraphRAG-style retrieval library from the HKU Data Intelligence Lab."
description: |
  LightRAG is a research-grade retrieval-augmented generation library that constructs an entity-relation knowledge graph from a corpus and uses dual-level retrieval (low-level entity match plus high-level community / topic match) at query time. The accompanying EMNLP 2025 paper documents consistent retrieval-quality gains over flat RAG baselines at lower index cost than Microsoft's GraphRAG.

  In the atlas: LightRAG is a peer to graphrag, R2R, and Verba on the structured-retrieval shelf. Differentiator is the lighter index construction — operators who found GraphRAG's prompt-heavy entity-extraction cost prohibitive use LightRAG as the smaller-budget alternative with similar graph-augmented retrieval semantics.
