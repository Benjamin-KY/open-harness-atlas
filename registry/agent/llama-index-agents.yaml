    free: true
sovereignty_notes: |
  US-incorporated; OSS core is MIT-licensed and fully self-hostable.
  Multi-provider via `llama_index.llms.*` adapters (OpenAI / Anthropic /
  Google / Mistral / Ollama / vLLM / OpenAI-compatible endpoints).
  Conservative model-agnostic 4 because some agent classes
  (OpenAIAgent specifically) assume OpenAI tool-call protocol;
  generic FunctionCallingAgent works against any compatible backend.
