tagline: LlamaIndex's agent layer — ReAct / OpenAIAgent / FunctionCallingAgent over a RAG-native data substrate.
description: |
  LlamaIndex's agent layer (the `llama_index.core.agent` module) provides
  ReAct, OpenAIAgent, and FunctionCallingAgent implementations on top
  of LlamaIndex's data-substrate primitives (Indices, Retrievers,
  Engines). The defining strength of the LlamaIndex agent path is its
  tight coupling with the RAG layer — `QueryEngineTool` wraps any
  index as a tool with zero glue code.

  In the atlas: LlamaIndex Agents is the canonical example of a
  **RAG-native** agent framework. Note: the LlamaIndex RAG core itself
  is out of scope for the registry per
  [`GOVERNANCE.md`](../../GOVERNANCE.md) §8 (pure RAG cores are
  catalogued in [`docs/adjacencies.md`](../../docs/adjacencies.md)) —
  but the agent layer is in scope.
