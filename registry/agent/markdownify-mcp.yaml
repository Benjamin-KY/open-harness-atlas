tagline: "Model Context Protocol server for converting almost anything to Markdown — PDF, DOCX, HTML, audio transcription, image OCR — for agent ingestion."
description: |
  Markdownify MCP is an MCP server that converts a wide range of source formats (PDF, DOCX, HTML, audio transcription, image OCR) into clean Markdown for agent ingestion. Solves the common harness problem where a tool-using agent needs to consume document attachments in a uniform LLM-friendly format without each agent re-implementing format-specific parsing.

  In the atlas: markdownify-mcp sits with mcp-playwright, mobile-mcp, arxiv-mcp-server, and microsoft-mcp on the agent / mcp-server shelf. The content-normalisation tool surface is its own niche — it is to document ingestion what mcp-playwright is to browser automation.
