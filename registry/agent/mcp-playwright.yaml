sovereignty_notes: |
  Added 2026-06-15 via the v0.4.0 fresh-discovery sweep (8 gh-search topic queries, OSI-license filter, anti-laziness cross-reference against the existing 838 yaml files for both simple-id and owner-disambiguator collisions).
  MIT; npm-installable MCP server; runs locally on the operator's machine. Browser-side automation is fully local; the only network surface is whatever target sites the agent instructs it to visit. No call-home.
