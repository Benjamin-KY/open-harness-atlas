tagline: "Playwright Model Context Protocol server — browser and API automation as MCP tools for Claude Desktop, Cline, Cursor, and other MCP clients."
description: |
  MCP Playwright is a Model Context Protocol server that exposes Playwright's browser and API automation as MCP tools. Any MCP-aware agent (Claude Desktop, Cline, Cursor, openai-agents, Continue) can use the server to drive browsers, fill forms, scrape DOM, and make authenticated API calls without needing a Playwright integration of its own.

  In the atlas: mcp-playwright is catalogued under agent / mcp-server alongside other named MCP servers (mobile-mcp, arxiv-mcp-server, markdownify-mcp, microsoft/mcp). The MCP-server subcategory exists specifically to recognise the tool-provisioning layer of the agentic stack — distinct from agent frameworks (which consume tools) and from raw Playwright (which is a browser library).
