sovereignty_notes: ravitemer is a single community maintainer (GitHub User owner, Warp-sponsored) shipping mcphub.nvim under MIT — a feature-rich MCP client for Neovim with full tool/resource/template/prompt support, three transports (stdio/SSE/Streamable-HTTP), OAuth+PKCE for remote servers, integrations with Avante.nvim/CodeCompanion.nvim/CopilotChat.nvim, server marketplace with auto-install, project-local configs, hot-reload dev mode, and native Lua MCP servers. Model-agnostic 3 — model choice is delegated to whichever chat plugin the user pairs it with, so model-agnosticism inherits from the host plugin.
