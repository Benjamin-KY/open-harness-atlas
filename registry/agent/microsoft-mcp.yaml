model_agnostic_score: 4
sovereignty_notes: |
  Added 2026-06-15 via the v0.4.0 fresh-discovery sweep (8 gh-search topic queries, OSI-license filter, anti-laziness cross-reference against the existing 838 yaml files for both simple-id and owner-disambiguator collisions).
  MIT; per-server deployment shape (most are .NET / Node binaries). Authentication is operator-controlled (typically Entra ID / Azure AD scoped tokens). No call-home beyond the Microsoft endpoints each specific server is purpose-built to talk to. SAML-blocked for non-Microsoft GitHub OAuth tokens — refresh-metadata cannot update sidecar from this fork's CI; gracefully degraded to data_missing (see HANDOVER gotcha #2).
harness_paradigm_alignment: aligned
deployment_posture: local-first
