primary_language: C#
tagline: "Catalog of official Microsoft Model Context Protocol server implementations — data access and tool integration for Azure, Dynamics, Graph, and more."
description: |
  Microsoft MCP is the official catalogue and source-of-truth repository for Microsoft-maintained MCP server implementations: Azure resource access, Microsoft Graph, Dynamics 365, Microsoft 365 / SharePoint, and the rest of the Microsoft data surface. Each server lives in a subdirectory with its own README, build, and deployment instructions.

  In the atlas: microsoft-mcp is the Microsoft counterpart to the openai-agents tool catalogue and the named MCP servers (mcp-playwright, mobile-mcp, arxiv-mcp-server). Distinct from single-tool MCP servers because the deliverable is a curated set rather than one service — useful for operators standing up Microsoft-stack agents.
maturity: ga
