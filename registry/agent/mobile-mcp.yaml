primary_language: TypeScript
tagline: "Model Context Protocol server for mobile automation — drive iOS, Android, simulators, emulators, and real devices from any MCP-aware agent."
description: |
  Mobile MCP is an MCP server that exposes mobile-device automation surfaces (iOS, Android, simulators, emulators, real devices via USB / cloud) as MCP tools. Lets an agent tap, swipe, type, screenshot, and inspect a mobile UI exactly the way a human tester would, through a single uniform tool interface that doesn't require the agent to speak XCUITest or UIAutomator.

  In the atlas: mobile-mcp sits on the same agent / mcp-server shelf as mcp-playwright (browser side), arxiv-mcp-server (knowledge side), and markdownify-mcp (content side). Recognising the mobile-automation tool surface as a first-class harness piece matters because the operator's compliance / test workflows often live on mobile devices where the agent's only sensible tool affordance is the device UI itself.
