origin_country: null
model_agnostic_score: 5
sovereignty_notes: |
  Added 2026-06-15 after `meta-llama/llama-stack` repo transfer to
  `ogx-ai/ogx`. Verified via `gh api repos/meta-llama/llama-stack`
  which now returns full_name `ogx-ai/ogx` — MIT, 8,408 stars,
  last push 2026-06-14, not a fork. Catalogued under the new
  upstream identity rather than the legacy one.

  MIT-licensed; community-maintained outside Meta after the
  transfer. The stack is provider-pluggable on every axis —
  inference can point at Ollama, vLLM, TGI, OpenAI, Bedrock,
  Azure OpenAI, or any OpenAI-compatible endpoint; memory at any
  vector store the operator runs; safety at Llama Guard, custom
  classifiers, or operator-supplied policies. Self-hosting is the
  default deployment shape; managed hosting is not a required
  dependency.
