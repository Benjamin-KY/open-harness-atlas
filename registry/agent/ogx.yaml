tagline: Open GenAI Stack — composable agent runtime, tool registry, RAG and safety layers behind a single API surface. Forked and rebranded from Meta's llama-stack.
description: |
  OGX is the community continuation of Meta's `llama-stack`
  project, rebranded as the "Open GenAI Stack" after Meta
  transferred the public repository to an independent
  organisation. It packages the same six surface APIs Llama Stack
  originally specified — inference, agents, memory / RAG, safety,
  tools, and telemetry — behind a single OpenAPI-described
  surface so application code can be written against the stack
  once and deployed across local-only, on-prem cluster, and
  managed-cloud backends.

  In the atlas: ogx is the agent-stack subcategory analogue to
  langchain (orchestration-first) and llama-index (retrieval-
  first) — its differentiator is the explicit multi-API contract
  with safety and telemetry as first-class surface, designed for
  operators who want a single stable interface they can swap
  inference / memory / safety implementations behind. The
  original `meta-llama/llama-stack` URL now redirects here.
maturity: beta
