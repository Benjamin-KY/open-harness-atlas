sovereignty_notes: 'OpenCoworkAI (company, GitHub Organization with bilingual EN/中文 README and WeChat/Discord community) ships Open Cowork under MIT as an open-source desktop alternative to Claude Cowork on Windows and macOS. Model-agnostic 3 reflects support for Claude, OpenAI-compatible APIs, and Chinese models (GLM, MiniMax, Kimi) plus OpenRouter; local-weights paths are not pitched first-class. Noteworthy operational flags: VM-level sandbox via WSL2 (Windows) / Lima (macOS), built-in MCP and skill systems, and Feishu/Lark + Slack remote-control integrations. Origin country set to CN based on Feishu/WeChat-first community and Chinese-model first-class support.'
