tagline: "Lightweight multi-agent and voice-agent framework — the official TypeScript counterpart to openai-agents-python."
description: |
  OpenAI Agents JS is the official TypeScript / JavaScript framework for building multi-agent workflows and voice agents on top of the OpenAI APIs. Mirrors the Python library's primitives (Agent, Runner, Tool, Handoff, Guardrail) and adds Node-flavoured ergonomics. Designed for parity with openai-agents-python so the same architectural patterns work on both runtimes.

  In the atlas: openai-agents-js sits on the same agent-framework shelf as openai-agents-python, Claude Agent SDK, Strands Agents, and LangChain. The JS variant matters because front-end-heavy agent surfaces (web chat UI, VS Code extensions, Electron apps) need a same-runtime framework rather than a Python-FFI bridge.
