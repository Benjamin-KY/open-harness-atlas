sovereignty_notes: |
  Added 2026-06-15 via the v0.4.0 fresh-discovery sweep (8 gh-search topic queries, OSI-license filter, anti-laziness cross-reference against the existing 838 yaml files for both simple-id and owner-disambiguator collisions).
  MIT; npm-installable. Like the Python sibling, ships OpenAI-first defaults but the abstractions accept any OpenAI-compatible endpoint, including local Ollama, vLLM, and self-hosted serving. MAS=3 because the framework leans on OpenAI-specific Responses-API features (built-in tools, structured outputs in their native shape) that require shims when targeting non-OpenAI providers.
