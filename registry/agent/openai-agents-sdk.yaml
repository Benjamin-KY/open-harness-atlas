tagline: OpenAI's lightweight agent SDK with tool decorators, handoffs, guardrails, and tracing.
description: |
  The OpenAI Agents SDK is an Apache-2.0-licensed Python SDK from OpenAI
  for building tool-using agents. Tools are decorated with
  `@function_tool`, agents declare their tools and instructions, and the
  `Runner.run()` / `Runner.run_streamed()` loop handles the model-native
  tool-use cycle. The SDK includes built-in agent **handoffs** (one
  agent delegating to another) and **guardrail** primitives for input /
  output checks.

  In the atlas: OpenAI Agents SDK is included as the **provider-native**
  reference. Despite the name, the SDK supports any
  OpenAI-compatible endpoint via `base_url` and `api_key` overrides, so
  the same code runs against vLLM, Ollama, and self-hosted endpoints —
  making it a useful neutral target for code that needs to remain
  portable.
