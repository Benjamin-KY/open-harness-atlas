sovereignty_notes: |
  OpenAI-maintained, Apache-2.0, fully self-hostable as a Python package.
  Multi-provider via OpenAI-compatible endpoint override (any vLLM /
  Ollama / TGI server works). No telemetry without explicit tracing
  configuration. Conservative model-agnostic 3 because the SDK's
  built-in tool-call protocol assumes OpenAI's specific function-calling
  format — non-OpenAI backends work but must implement that format.
