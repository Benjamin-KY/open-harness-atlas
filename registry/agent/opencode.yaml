description: |
  OpenCode is a terminal-native AI coding agent built in Go. Operates directly on the local filesystem and git working tree, supports multi-provider LLM backends, and includes a TUI for interactive sessions. The repository was archived in September 2025 but remains a useful historical reference for the CLI-coding-agent pattern — community continuations exist under multiple forks.

  In the atlas: opencode is catalogued on the code-agent shelf alongside aider, cline, open-swe, swe-agent, mini-swe-agent. Distinguishing detail is the Go implementation (vs Python-dominated alternatives) which makes the binary easier to ship into restricted environments that can't run a full Python interpreter.
