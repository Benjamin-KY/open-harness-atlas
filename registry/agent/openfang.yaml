sovereignty_notes: 'RightNow-AI (company; openfang.sh, Organization owner) ships OpenFang under Apache-2.0 — a Rust ''Agent Operating System'' compiled to a single ~32 MB binary with 7 bundled Hands (autonomous capability packages defined by HAND.toml + multi-phase system prompts + SKILL.md + guardrails) that run on schedules rather than waiting for chat input. Model-agnostic 3 is reasonable: Hands consume provider-portable LLM backends with explicit local + cloud options, but the README does not foreground a config-driven provider swap with full OpenAI-compat parity (so MAS=4 would overclaim). Pre-1.0 (v0.6.9) with explicit ''pin to a specific commit for production'' warning — handle as ga-trajectory beta.'
