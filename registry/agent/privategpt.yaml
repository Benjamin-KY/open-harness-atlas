description: |
  PrivateGPT is a fully local RAG stack: document loaders, embedding store (Qdrant), local LLM inference (Llama, Mistral, etc.), API + UI — all running on the operator's own hardware. 100% no-egress by default.

  In the atlas: the canonical reference for the `local-possible-spine` pattern. Peer to `localgpt`, `anythingllm`, `khoj` on the local-first-RAG shelf.

