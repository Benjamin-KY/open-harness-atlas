sovereignty_notes: |
  Added 2026-06-14 via the awesome-list discovery sweep (GraphQL-batched parser; >= 2-list endorsement).
  Apache-2.0; designed from day one for air-gapped / fully-local operation. Default config makes ZERO outbound calls — the embedding model, the vector store (Qdrant), and the LLM all run on the host. Optionally swappable to a managed provider, but that defeats the point.

