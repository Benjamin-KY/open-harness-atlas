sovereignty_notes: Pydantic (company, UK; pydantic.dev / Logfire) publishes Pydantic AI under MIT as a Python agent framework with first-class typing, agent capabilities, MCP / A2A / UI integrations, human-in-the-loop tool approval, durable execution, streamed structured outputs, and a Graph API. Model-agnostic 4 is supported by the README's exhaustive provider list (OpenAI, Anthropic, Gemini, DeepSeek, Grok, Cohere, Mistral, Perplexity, plus Azure / Bedrock / Vertex / Ollama / LiteLLM / Groq / OpenRouter / Together / Fireworks / Cerebras / HF / GitHub / Heroku / Vercel / Nebius / OVHcloud / Alibaba / SambaNova) and explicit custom-model extension. Tight Logfire OTel integration is opt-in; the agent framework runs against any OTel-compatible backend.
