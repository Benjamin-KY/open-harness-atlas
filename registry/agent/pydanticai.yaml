repo_url: https://github.com/pydantic/pydantic-ai
homepage: https://ai.pydantic.dev/
license: MIT
primary_language: Python
tagline: Type-safe agent framework from the Pydantic team — tools as decorated functions, structured outputs as Pydantic models.
description: |
  PydanticAI is an agent framework built by the Pydantic team that
  brings Pydantic's type-safety discipline to LLM agent construction.
  Agents are typed Python objects (`Agent[Deps, Output]`), tools are
  decorated functions with `RunContext[Deps]` injection, structured
  outputs are Pydantic models, and streaming, multi-turn, and
  function-calling are first-class. It deliberately avoids the
  inheritance-heavy patterns of older agent frameworks.

  In the atlas: PydanticAI is the canonical example of a **typed-tools**
  agent framework. It pairs cleanly with governance harnesses because
  its strict output typing is enforceable at the type-check layer
  (mypy / pyright) — closing one common drift surface.
