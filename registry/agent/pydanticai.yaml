sovereignty_notes: |
  Maintained by the UK-incorporated Pydantic Services. MIT-licensed and
  fully self-hostable. First-class adapters for OpenAI, Anthropic,
  Google, Groq, Mistral, Ollama, and arbitrary OpenAI-compatible
  endpoints. Conservative model-agnostic 4 because some structured-output
  features depend on provider-specific tool-call formats; switching
  backends sometimes requires minor schema adjustments.
