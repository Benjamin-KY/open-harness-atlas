tagline: "Agent framework built on the Qwen model family — function calling, MCP, code interpreter, RAG, browser automation."
description: |
  Qwen-Agent is the official agent framework around Alibaba's Qwen series of open-weight language models. Ships function-calling, an MCP client, a code interpreter, RAG primitives, browser-automation tools, and a small set of demo agents (QwenChat-style assistant, browser agent, code agent). Designed to take advantage of Qwen-specific instruction-following and tool-use training rather than be a fully provider-agnostic framework.

  In the atlas: Qwen-Agent is the Qwen-family counterpart to Hugging Face's `transformers` agents, OpenAI's openai-agents-python, and Anthropic's claude-agent-sdk — model-family-flavoured frameworks that prioritise the upstream's own model behaviour over cross-provider portability.
