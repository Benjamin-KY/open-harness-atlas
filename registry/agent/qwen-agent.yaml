sovereignty_notes: |
  Added 2026-06-15 via the v0.4.0 fresh-discovery sweep (8 gh-search topic queries, OSI-license filter, anti-laziness cross-reference against the existing 838 yaml files for both simple-id and owner-disambiguator collisions).
  Apache-2.0; runs locally against Qwen weights (operator-downloaded). Can call out to DashScope or any OpenAI-compatible endpoint, but is optimised for and best with Qwen models. MAS=2 because the framework leans on Qwen-specific tool-use formatting — works elsewhere but is not the obvious choice for non-Qwen deployments.
