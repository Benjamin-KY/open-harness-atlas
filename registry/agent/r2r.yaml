tagline: "Production-grade agentic RAG with a RESTful API — multi-modal ingestion, hybrid retrieval, GraphRAG, and operator dashboards in one stack."
description: |
  R2R (Reason-to-Retrieve) is SciPhi's open-source agentic-RAG platform. Bundles multi-modal ingestion, hybrid (vector + full-text + graph) retrieval, GraphRAG-style entity extraction, evaluation harnesses, and operator-facing dashboards behind a single RESTful API. Designed for the case where the operator wants to deploy an end-to-end retrieval service rather than wire RAG primitives together themselves.

  In the atlas: R2R is catalogued on the RAG-platform shelf with RAGFlow, Verba, Cognita, DocsGPT. Differentiator is the explicit reason-then-retrieve loop semantics — retrieval is wrapped in an agentic planning step rather than being a single-shot lookup.
