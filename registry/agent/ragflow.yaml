tagline: "End-to-end RAG engine with deep document understanding, fused with agent capabilities for production knowledge work."
description: |
  RAGFlow is an open-source retrieval-augmented generation engine that combines deep document understanding (layout-aware parsing of PDFs, slides, tables, scans) with a full indexing / retrieval / answer-generation pipeline and a browser-based operator UI. The 2025 line added agentic extensions so retrieval can be wrapped in tool-calling loops rather than only used as a single-shot retriever.

  In the atlas: RAGFlow is catalogued under agent / rag-platform alongside other end-to-end RAG products like Verba, Cognita, and R2R — distinct from RAG *libraries* (LlamaIndex, Haystack) by virtue of shipping the operator UI and document parsing as part of the deliverable, not as a separate integration the operator has to wire up.
