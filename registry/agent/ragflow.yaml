sovereignty_notes: |
  Added 2026-06-15 via the v0.4.0 fresh-discovery sweep (8 gh-search topic queries, OSI-license filter, anti-laziness cross-reference against the existing 838 yaml files for both simple-id and owner-disambiguator collisions).
  Apache-2.0; self-hosted via Docker / Kubernetes. LLM and embedding backends are operator-configurable (OpenAI / Anthropic / Tongyi / Moonshot / DeepSeek / Ollama / vLLM / any OpenAI-compatible endpoint). No call-home in normal operation. The hosted ragflow.io is a separate optional service — the OSS deliverable is everything an operator needs to run the full stack on their own hardware.
