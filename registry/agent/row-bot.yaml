sovereignty_notes: 'siddsachar is a single community maintainer (GitHub User owner) shipping Row-Bot (formerly Thoth) under Apache-2.0 — a local-first desktop AI assistant built on a LangGraph ReAct agent with a personal knowledge graph (10 entity types, 67 typed relations), 30+ core tools (search, Gmail/Calendar, filesystem, shell, browser automation, MCP, Developer Studio with Docker sandbox, Designer Studio for decks/docs), workflows, voice channels (Telegram/WhatsApp/Discord/Slack/SMS), and explicit Dream Cycle memory refinement. Model-agnostic 4 — Ollama (local first-class), OpenAI/Anthropic/Google/xAI/MiniMax/OpenRouter/Atlas/Ollama Cloud, plus OpenAI-compatible LM Studio/vLLM/llama.cpp/LocalAI/LiteLLM/SGLang/oMLX — all selectable per-thread/per-workflow with explicit capability labels and chat-only fallback. Strong sovereignty posture: no Row-Bot-hosted inference, no telemetry, OS-credential-store key storage.'
