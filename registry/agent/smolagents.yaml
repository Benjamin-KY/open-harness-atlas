license: Apache-2.0
primary_language: Python
tagline: Hugging Face's minimal agent framework — agents that write Python code to take actions.
description: |
  smolagents is Hugging Face's small, Apache-2.0 agent framework where
  agents **act by writing Python code** rather than emitting tool-call
  JSON. The agent's reasoning step produces a code snippet, the
  framework executes it in a sandbox (`E2BCodeExecutor`,
  `LocalPythonExecutor`, or `DockerCodeExecutor`), and the result feeds
  back into the next reasoning step. It supports both `CodeAgent`
  (code-action) and `ToolCallingAgent` (traditional tool-call) styles.

  In the atlas: smolagents is the canonical example of a **code-action**
  agent framework — empirically, code-action agents often outperform
  tool-call agents on tasks that need data manipulation, math, or
  composition of multiple tool results.
