sovereignty_notes: |
  Hugging Face-maintained, Apache-2.0, fully self-hostable as a Python
  package. Multi-provider via `HfApiModel`, `LiteLLMModel`,
  `TransformersModel` (local), and `OpenAIServerModel` (any
  OpenAI-compatible endpoint). The `TransformersModel` runs fully
  local; conservative model-agnostic 4 because code-action quality
  varies meaningfully across models — small local models produce
  lower-quality code than frontier models.
