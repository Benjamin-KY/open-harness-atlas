tagline: AWS's openly-licensed agent SDK — model-native tool use with Anthropic, OpenAI, and Bedrock backends.
description: 'Strands is AWS''s Apache-2.0-licensed agent SDK that uses the

  **model-native** tool-use loop: the model decides when to call tools,

  the SDK executes them, and the loop continues until the model

  emits a final response. It supports Anthropic (Bedrock or direct),

  OpenAI, and any AWS Bedrock model, and emphasises a small, stable

  API surface (Agent, tools, model).


  In the atlas: Strands is included as an example of an **AWS-native**

  agent framework that is fully OSS-licensed. The model-native tool-use

  pattern is the same one Anthropic''s Claude Agent SDK and OpenAI''s

  Agents SDK use, so Strands is a clean way to write portable code

  that runs against multiple providers without rewriting the orchestration

  loop.

  '
