sovereignty_notes: 'AWS-maintained, Apache-2.0, self-hostable as a Python package. Backends

  include Anthropic (direct or via Bedrock), OpenAI, and AWS Bedrock

  catalogue models. Self-hosted local model support is via the OpenAI-

  compatible endpoint adapter. Conservative model-agnostic 3 — production

  documentation centres on AWS Bedrock; non-AWS deployments work but

  require explicit configuration.

  '
