description: |
  Tarsier is Reworkd AI's vision utility for web agents: tags interactable elements with bracket IDs, converts pages to OCR-structured ASCII text for text-only LLM agents. Unimodal GPT-4 + Tarsier-Text beats GPT-4V on internal benchmarks by 10-20%; Google Vision + Azure OCR backends; compatible with Playwright; reusable perception layer..

  In the atlas: Tarsier is an agent-orchestration entry. The harness paradigm reads agent frameworks as the policy + tool-routing layer that sits between intent and the model tier.
