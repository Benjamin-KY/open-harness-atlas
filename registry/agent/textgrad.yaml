model_agnostic_score: 4
sovereignty_notes: 'Stanford is US-incorporated; TextGrad itself is MIT-licensed and

  self-hostable. Multi-provider via LiteLLM / OpenAI / Anthropic

  / Together / vLLM adapters — any chat-completion endpoint can be

  the "engine" that generates the textual gradients. Local /

  OpenAI-compatible endpoints are supported but practical

  performance depends on the gradient-generator''s reasoning depth

  — small local models produce thinner gradients. No call-home.

  '
