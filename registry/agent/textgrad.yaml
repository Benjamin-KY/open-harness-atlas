tagline: '"Automatic differentiation via text" — LLM-generated textual gradients that backpropagate through prompts, code, and molecule structures.'
description: 'TextGrad is the canonical implementation of "textual gradients" —

  the Stanford ZouLab paper that reframes prompt and pipeline

  optimisation as a backpropagation problem where the gradient is

  itself a natural-language critique generated by a strong LLM.

  Each `Variable` (prompt fragment, intermediate output, final

  answer) carries a `.gradient` text field; calling `.backward()`

  asks the LLM "what would improve this output?" and the resulting

  critique flows back through the computational graph. The same

  primitive optimises prompts, code, molecule structures, and

  treatment plans.


  In the atlas: TextGrad is the **auto-optimiser** subcategory

  ancestor of AdalFlow and a peer to DSPy''s `BootstrapFewShot` —

  the academic reference implementation of the technique. Operators

  use it when they need the optimisation loop to be transparent

  and inspectable (every gradient is a readable natural-language

  critique) rather than treated as a black-box prompt-tuning step.

  '
