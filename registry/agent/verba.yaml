tagline: "Weaviate's open-source RAG chatbot — turnkey document ingestion, vector retrieval, and chat UI built around the Weaviate vector store."
description: |
  Verba is Weaviate's open-source RAG chatbot — a turnkey deployment combining document ingestion, vector retrieval via Weaviate, and a chat UI for end-user Q&A over the operator's corpus. Designed as a reference application showcasing Weaviate features rather than a fully provider-neutral framework, but the LLM and embedding layers are pluggable.

  In the atlas: Verba is the Weaviate-flavoured counterpart to RAGFlow, R2R, Cognita, and DocsGPT on the RAG-platform shelf. Operators already running Weaviate as their vector store use it as a fast path to a deployable Q&A surface; operators standing up a fresh stack typically reach for RAGFlow or R2R instead.
