sovereignty_notes: |
  Added 2026-06-15 via the v0.4.0 fresh-discovery sweep (8 gh-search topic queries, OSI-license filter, anti-laziness cross-reference against the existing 838 yaml files for both simple-id and owner-disambiguator collisions).
  BSD-3-Clause; self-hostable Docker stack. Vector store is Weaviate (self-hostable or hosted). LLM and embedding providers are operator-pluggable (OpenAI, Cohere, Ollama, HF, etc.). The hosted Weaviate cloud is optional — the OSS Weaviate runs locally and Verba on top of it gives a fully self-hosted stack.
