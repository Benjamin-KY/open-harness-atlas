sovereignty_notes: |
  Added 2026-06-15 via the v0.4.0 fresh-discovery sweep (8 gh-search topic queries, OSI-license filter, anti-laziness cross-reference against the existing 838 yaml files for both simple-id and owner-disambiguator collisions).
  MIT; self-hostable Python service. Each pluggable primitive (ASR, TTS, LLM, telephony) is provider-configurable so the operator can run fully on-prem if they pair a local Whisper / TTS / OpenAI-compatible LLM endpoint. Hosted Vocode is optional and separate from the OSS core.
