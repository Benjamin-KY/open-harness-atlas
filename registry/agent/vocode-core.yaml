tagline: "Open-source voice-based LLM agent framework — modular ASR / TTS / turn-taking primitives for real-time phone and browser voice agents."
description: |
  Vocode Core is the open-source framework for building voice-first LLM agents. Provides modular ASR (Deepgram, Whisper, AssemblyAI), TTS (ElevenLabs, OpenAI TTS, Azure TTS, Coqui), turn-taking and endpointing, and telephony integrations (Twilio, Vonage). Ships reference agents for inbound call handling, outbound calling, and browser-based voice UI.

  In the atlas: Vocode is catalogued under agent / voice-agent alongside LiveKit Agents and Pipecat. Distinct from the broader agent-framework shelf because the differentiator is the voice loop primitives (ASR + TTS + barge-in + turn-taking) which a text-only framework like LangChain does not provide.
