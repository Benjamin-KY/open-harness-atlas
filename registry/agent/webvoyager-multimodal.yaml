description: |
  WebVoyager is Hongliang He et al. (Zhejiang University / Tencent)'s lMM-powered web agent combining visual + textual input for end-to-end real-website task completion; Selenium-based; GPT-4V evaluation protocol. ACL 2024; 643 curated tasks across 15 real websites; GPT-4V automated eval; text-only mode outperforms GPT-4V screenshot via Tarsier-style encoding..

  In the atlas: WebVoyager is an agent-orchestration entry. The harness paradigm reads agent frameworks as the policy + tool-routing layer that sits between intent and the model tier.
