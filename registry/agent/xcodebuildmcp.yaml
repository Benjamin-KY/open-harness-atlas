sovereignty_notes: 'Sentry (commercial; MIT) maintains XcodeBuildMCP, a Node.js MCP server (and CLI) that exposes Xcode build / simulator / device automation as MCP tools for AI coding agents, with Homebrew and npm distributions. Model-agnostic 4 because MCP is a transport contract: the server has no opinion about which LLM client is on the other end — Cursor, Claude Code, Codex, and any MCP-compatible client are all first-class. Alignment ''partial'': it is a tool surface for the Agent component, not a harness.'
