description: |
  Anthropic's MIT-licensed interactive prompt-engineering tutorial
  is a self-paced course delivered as Jupyter notebooks. It covers
  prompt structure, role-prompting, separating data from instructions,
  output-format control, multi-shot prompting, chain-of-thought,
  function-calling, and tool-use, with exercises and worked
  solutions at the end of each chapter.

  In the atlas: this is included as a **vendor-grade prompt-engineering
  curriculum from an LLM lab**. The mechanics transfer to non-Claude
  models with only minor edits (Anthropic's `system` / message-array
  format is itself a near-superset of OpenAI's). It is a healthy
  counterweight to the OpenAI Cookbook's vendor-specific examples.
