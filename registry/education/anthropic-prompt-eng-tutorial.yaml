sovereignty_notes: |
  US-incorporated company; notebooks MIT-licensed; principles are
  portable across LLM providers. The notebooks call the Anthropic
  API directly, so running them as-is requires Anthropic API access —
  which since 2026-06-13 is geopolitically constrained for foreign
  nationals (see Fable / Mythos worked example). Concepts transfer
  to a local Claude-format-compatible backend (e.g., LiteLLM
  fronting any provider) with minor adapter work. Model-agnostic 3.
