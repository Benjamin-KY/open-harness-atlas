sovereignty_notes: |
  Anthropic is US-incorporated (San Francisco PBC); the course
  materials are Apache-2.0 OSS and self-hostable as static
  notebooks. The runnable code, however, calls the hosted Anthropic
  API (claude.ai) — there is no local-backend variant. `model_agnostic
  _score` is 1 because every executable example assumes Anthropic
  models and the Anthropic SDK. Operators using the materials as
  pedagogy can swap the model layer for OpenAI / Mistral / Ollama /
  vLLM with minor SDK rewrites; the prompt-engineering content
  translates across providers but is calibrated to Claude's behaviour.
