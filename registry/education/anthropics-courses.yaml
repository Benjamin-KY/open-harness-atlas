tagline: Anthropic's official educational courses on prompt engineering, real-world prompting, agents, tool use, and the Model Context Protocol.
description: |
  Anthropic's official open-source education repository — five
  self-paced courses covering Anthropic API fundamentals, prompt
  engineering, real-world prompting patterns, agentic tool use, and
  the Model Context Protocol (MCP). Each course is a sequence of
  Jupyter notebooks with executable cells, exercises, and reference
  answers. The agents and MCP courses in particular ship working
  reference implementations of tool-using agents end-to-end.

  In the atlas: Anthropic Courses is the canonical
  **vendor-cookbook** for the Anthropic stack — the educational
  counterpart to OpenAI's `openai-cookbook` and Mistral's
  `mistral-cookbook`. It is catalogued under `education` because
  the deliverable is teaching material; the runnable code is
  vendor-specific to the Anthropic API rather than provider-neutral
  framework code.
