description: |
  fast.ai's Practical Deep Learning for Coders, Part 2 (course22p2)
  is fast.ai's Apache-2.0 hands-on course building deep-learning
  models — including diffusion models and the start of an LLM — from
  foundations. The course pairs free video lectures with notebooks
  in the public repository, emphasising practitioner intuition and
  iterative experimentation. Jeremy Howard's "code first, theory
  second" pedagogy is the explicit counterweight to the formal
  university-course approach.

  In the atlas: fast.ai Part 2 is the **practitioner foundations**
  entry — accessible, build-first, and pedagogically distinct from
  Karpathy (from-scratch minimalism) and CS336 (formal university).
