sovereignty_notes: |
  Added 2026-06-15 after the prior `google-gemini/gemma-cookbook`
  repo was archived and redirected to `google-gemma/cookbook`.
  Verified via `gh api repos/google-gemma/cookbook` —
  Apache-2.0, 3,680 stars, last push 2026-06-14, not a fork.

  Cookbook content is Apache-2.0; runs locally against weights
  the operator has downloaded. Gemma weights themselves are
  released under the Gemma Terms of Use (custom, not OSI but
  permissive for commercial use). Provider-portability is
  inherent — once weights are local, no Google-side endpoint or
  authentication is involved. Notebooks intentionally target
  multiple downstream runtimes (vanilla Transformers, Ollama,
  llama.cpp, MediaPipe) so the operator chooses the deployment
  shape that matches their sovereignty posture.
