tagline: Google's official cookbook of notebooks and worked examples for the Gemma open-weight model family — fine-tuning, RAG, agents, deployment.
description: |
  The Gemma Cookbook is Google's official open repository of
  recipes for working with the Gemma family of open-weight
  language models. Content is structured as runnable Jupyter
  notebooks covering single-turn prompting, instruction
  fine-tuning, RAG over local corpora, simple agentic loops,
  on-device deployment via MediaPipe / TFLite, and integration
  with the wider open ecosystem (Hugging Face, Ollama, llama.cpp,
  vLLM). Notebooks are versioned alongside the model releases so
  the worked examples track the latest checkpoint behaviour.

  In the atlas: gemma-cookbook is the Gemma-side counterpart to
  the openai-cookbook and google-gemini/cookbook entries — first-
  party tutorial content for a specific model family rather than
  a generic harness. Catalogued under education / cookbook
  because the deliverable is reproducible recipes, not a
  framework. Notable because Gemma is genuinely open-weight, so
  every notebook in here is something the operator can re-run
  fully offline with the weights they downloaded themselves.
