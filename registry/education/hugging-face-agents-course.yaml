tagline: Hugging Face's free course on building agents — from foundations through smolagents, LangGraph, and LlamaIndex.
description: |
  Hugging Face Agents Course is the Hugging Face team's Apache-2.0
  free course on building LLM agents. It progresses from agent
  foundations (planning, tool-calling, multi-step reasoning) through
  three concrete frameworks (Hugging Face smolagents, LangGraph,
  LlamaIndex agents) and concludes with deployment and evaluation
  patterns. Course content is published as Markdown / notebooks in
  the open repository; an optional certificate flow exists on the
  HF platform but is not required to learn from the material.

  In the atlas: this is the **multi-framework agent curriculum**
  entry. Where Microsoft AI Agents for Beginners centres on a single
  vendor stack, the HF course deliberately rotates across frameworks
  — useful for forming a framework-agnostic mental model.
