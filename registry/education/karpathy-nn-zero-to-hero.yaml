tagline: Andrej Karpathy's video-lecture series and accompanying notebooks building neural networks and transformers from scratch.
description: |
  Neural Networks — Zero to Hero is Andrej Karpathy's free video-
  lecture series (released on YouTube) with accompanying MIT-licensed
  Jupyter notebooks that build neural networks — and eventually a
  GPT-style transformer — from scratch in plain Python, then PyTorch.
  The series is widely considered one of the strongest introductions
  to the internals of modern LLMs without prerequisites beyond basic
  Python and calculus.

  In the atlas: this is the **foundations-from-scratch** education
  entry. It establishes what a model *is* before the rest of the
  catalog discusses what to put *around* a model.
