description: 'Learn Prompting is an MIT-licensed open-source guide to prompt

  engineering, organised as a multi-chapter free course covering

  basics, intermediate techniques (zero-shot, few-shot, chain-of-

  thought, self-consistency, tree-of-thoughts, retrieval-augmentation),

  advanced topics, and a substantial **prompt-injection / prompt-

  hacking** module. Content is community-authored, peer-reviewed,

  and rendered as a public website.


  In the atlas: this is the **community-authored, vendor-neutral

  prompt-engineering course**. It complements Anthropic''s interactive

  tutorial (vendor-grade, narrow) and the broader agent courses

  (framework-focused) by foregrounding prompting itself as the

  primary surface — useful before any framework is layered on.

  '
