tagline: Microsoft's 11-lesson free curriculum on building AI agents — covers Autogen, Semantic Kernel, and agent design patterns.
description: |
  AI Agents for Beginners is Microsoft's MIT-licensed 11-lesson free
  curriculum on AI agents. It covers agent design patterns (tool-use,
  planning, multi-agent orchestration, memory, MCP), with concrete
  worked examples in AutoGen, Semantic Kernel, and Azure AI Agent
  Service. Each lesson is a Jupyter notebook with code and exercises.

  In the atlas: this is included as a **major-vendor agent-curriculum
  example**. The core patterns (planning, tool-calling, multi-agent
  routing, memory, MCP) are framework-portable; the AutoGen examples
  run end-to-end against any OpenAI-compatible local backend.
