tagline: Karpathy's minimal end-to-end LLM training harness — tokenizer, pretraining, fine-tuning, eval, inference, and chat UI in a single hackable codebase.
description: |
  nanochat is Andrej Karpathy's MIT-licensed minimal training
  harness that walks through every stage of building a ChatGPT-style
  model end-to-end on a single GPU node: BPE tokenization,
  pretraining, supervised fine-tuning, evaluation, inference, and
  a chat UI. The codebase is deliberately small and hackable so the
  reader can step through the full pipeline rather than treating
  any stage as a black box. The README's central example trains a
  GPT-2-class model from scratch for roughly $48 on a spot-priced
  8xH100 node.

  In the atlas: nanochat is the **build-from-scratch chat-model
  training reference** point in the education space — adjacent to
  Karpathy's earlier `mingpt` and `nn-zero-to-hero` series. Where
  those teach the building blocks (attention, backprop, tokenisers,
  GPT), nanochat composes the building blocks into a complete
  ChatGPT-equivalent pipeline an operator can run on rented compute.
