sovereignty_notes: |
  Individually maintained by Karpathy; MIT-licensed; the harness
  runs entirely on rented or owned GPU hardware with no hosted
  dependency. Tokenizer, training loop, evaluation, and chat UI all
  produce standard PyTorch checkpoints. Model-agnostic 5 — the
  whole point is that no provider is in the loop; the operator
  trains their own model from scratch and serves it locally.
