tagline: Practical recipes and example notebooks for building with the OpenAI API.
description: |
  OpenAI Cookbook is OpenAI's MIT-licensed collection of practical
  Jupyter-notebook recipes for building with the OpenAI API:
  embeddings, fine-tuning, function-calling, RAG, evaluations,
  agentic patterns, vision / audio, and more. The notebooks are
  pedagogically clear and frequently used as templates by
  practitioners getting started with OpenAI-format LLMs.

  In the atlas: this is included as **practitioner-grade
  documentation for OpenAI-format APIs** — most of the patterns
  apply directly to any OpenAI-compatible backend (local Ollama,
  vLLM, llama.cpp; routed via LiteLLM), so the value is not
  vendor-locked even though the source is OpenAI.
