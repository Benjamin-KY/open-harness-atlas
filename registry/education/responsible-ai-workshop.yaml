sovereignty_notes: |-
  Microsoft (US-incorporated company); content is CC-BY-4.0 and openly published; code
  (where present) is self-hostable. Model-agnostic 3 — the demonstrated tooling (Fairlearn,
  InterpretML, Responsible AI Toolbox) is provider-agnostic and runs on local-weights
  models, but the worked examples often use Azure-aligned scenarios. Curator-reviewed
  2026-06-14: recategorised governance → education; the artefact is a tutorial series
  under a content licence (CC-BY-4.0), not a runtime governance harness with the five-
  component spine; the OSS tooling it teaches (Fairlearn, InterpretML) is catalogued
  separately under governance.
