tagline: Tutorials and walkthroughs for putting Responsible AI into practice — fairness, interpretability, error analysis, counterfactuals.
description: |-
  Responsible AI Workshop is a Microsoft-published series of Jupyter tutorials and
  walkthroughs that introduce the Responsible AI Toolbox, Fairlearn, InterpretML, and
  related evaluation techniques. Lessons walk through fairness assessment, error analysis,
  counterfactual exploration, and model interpretability — primarily on tabular ML and
  classical models, with some content extending to LLM scenarios.

  In the atlas: this is an education entry. The atlas catalogues free, open-licence
  learning material that builds practitioner literacy in the harness paradigm; this
  workshop is the closest free training material on auditing, fairness, and
  interpretability tooling that sits underneath any governance layer.
