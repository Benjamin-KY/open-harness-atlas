tagline: Stanford's open course on building large language models from scratch — architecture, training, inference, evaluation.
description: |
  Stanford CS336 (Language Models from Scratch) is Stanford's open
  graduate course on building large language models end-to-end. The
  spring-2025 instance ships lecture slides, assignment skeletons,
  and reading lists in the public repository under MIT — covering
  tokenisation, transformer architecture, training infrastructure,
  efficient inference, RLHF / RLAIF, evaluation, and safety. The
  course is designed to leave students able to reason about every
  layer of the stack rather than treating the model as a black box.

  In the atlas: CS336 is the **graduate-grade foundations** entry.
  Where Karpathy's Zero to Hero is the from-scratch introduction,
  CS336 is the formal university course at the next layer of
  rigour — and the open release of the lecture materials is itself
  a sovereignty-relevant artefact (the curriculum is portable across
  jurisdictions).
