sovereignty_notes: Single-maintainer (ejikezebedee; MIT) agent benchmark that measures transferable improvement across unseen 'marketplace missions' rather than memorisation, with seed-namespace separation, mission-overlap detection, trained-vs-control gap reporting, and external adapter contracts for ReAct / Plan-and-Solve / Reflexion. Model-agnostic 3 because the adapter contract is the only required interface — any LLM-backed agent can plug in, including local-only ones. Early-stage (RC, ~0 stars at time of review), so confidence is moderate; alignment 'partial' — it ships an eval runner, not a full harness.
