sovereignty_notes: AMD-AGI (company; Advanced Micro Devices' AI research group, US) ships AgentKernelArena under Apache-2.0 as a side-by-side arena for Cursor Agent, Claude Code, Codex, SWE-agent, OpenEvolve/GEAK and custom agents on real HIP/Triton GPU-kernel tasks. Model-agnostic 3 reflects the README's multi-provider support (OpenAI, Anthropic, OpenRouter, vLLM) with vLLM as a first-class local-weights path. Each run uses an isolated workspace duplicate, supports A/B / ablation across MCP servers, skills, prompts and tools, and reports compilation / correctness / GPU-performance scores.
