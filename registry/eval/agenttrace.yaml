sovereignty_notes: TensorStax (company-backing GitHub Organization, product site tensorstax.com) maintains AgentTrace under MIT — a lightweight tracing/evaluation framework for AI agents and LLMs with a `@tracer.trace` decorator, SQLite trace store, web dashboard (backend on port 3033, frontend on port 5173), and a TracerEval evaluation framework with custom scoring functions. Model-agnostic 3 — tracing wraps arbitrary async functions so any provider (OpenAI shown in examples; works with any) is supported; the evaluator scores outputs without provider lock-in. Maintenance pace has slowed (last push April 2025) — still within 18 months but worth a curator re-check.
