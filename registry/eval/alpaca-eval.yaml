description: |
  AlpacaEval is Stanford NLP's automated win-rate eval for instruction-following using LLM-as-judge with length-control. Length-Controlled WinRate removes length bias; highest correlation with human Chatbot Arena.

  In the atlas: AlpacaEval is an evaluation harness. Evaluation is the feedback loop that keeps every other harness honest — if you cannot measure the behaviour of the swap target, the swap is not really safe.
