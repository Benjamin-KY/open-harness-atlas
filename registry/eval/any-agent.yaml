sovereignty_notes: Mozilla.ai (commercial vendor mozilla.ai, Mozilla-backed startup); Apache-2.0 evaluation harness providing a single Python surface (`AnyAgent.create`) to run and evaluate seven agent frameworks (TinyAgent, Google ADK, LangChain, LlamaIndex, OpenAI Agents SDK, Smolagents, Agno). Now in soft deprecation in favour of `mozilla-ai-tinyagent` but still maintained for cross-framework eval use. Model-agnostic 2 — multi-provider via the underlying frameworks (Mistral, OpenAI, etc.) but no first-class local-weights surface of its own.
