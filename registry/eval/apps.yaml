description: |
  APPS (Automated Programming Progress Standard) is Dan Hendrycks's 10,000 python coding problems from competitive programming sites across intro, interview, and competition difficulty levels with execution grading. Three-tier difficulty (introductory → competition), graded by full test-suite pass rate; far broader difficulty range than HumanEval or BigCodeBench..

  In the atlas: APPS (Automated Programming Progress Standard) is an evaluation harness. Evaluation is the feedback loop that keeps every other harness honest — if you cannot measure the behaviour of the swap target, the swap is not really safe.
