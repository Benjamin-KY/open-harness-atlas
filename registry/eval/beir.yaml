description: 'BEIR (Benchmarking-IR) is BEIR Community (Nandan Thakur et al.)''s heterogeneous zero-shot IR benchmark with 18 diverse datasets (BioASQ, NFCorpus, TREC-NEWS, etc.) and unified evaluation under NDCG@10. Standard retrieval transfer-learning benchmark; 18 domains in one toolkit; no other registry entry specifically covers retrieval model evaluation..


  In the atlas: BEIR (Benchmarking-IR) is an evaluation harness. Evaluation is the feedback loop that keeps every other harness honest — if you cannot measure the behaviour of the swap target, the swap is not really safe.

  '
