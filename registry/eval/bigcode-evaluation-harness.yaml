  BigCode Evaluation Harness is BigCode / HuggingFace's evaluates code-generation LLMs on HumanEval, MBPP, DS-1000, MultiPL-E, and 30+ other coding tasks. Supports multi-language code eval (20+ PLs via MultiPL-E); sandboxed Docker execution.

  In the atlas: BigCode Evaluation Harness is an evaluation harness. Evaluation is the feedback loop that keeps every other harness honest — if you cannot measure the behaviour of the swap target, the swap is not really safe.
