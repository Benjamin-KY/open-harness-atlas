description: |
  ChatEval is THUDM / Tsinghua's multi-agent debate framework where LLM referees with distinct personas collaboratively judge responses. Multi-agent debate produces more calibrated evaluation than single-judge approach.

  In the atlas: ChatEval is an evaluation harness. Evaluation is the feedback loop that keeps every other harness honest — if you cannot measure the behaviour of the swap target, the swap is not really safe.
