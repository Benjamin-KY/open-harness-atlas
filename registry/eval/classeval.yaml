description: 'ClassEval is NLP Group, Nanyang Technological University / Fudan University''s first class-level Python code generation benchmark with 100 manually crafted classes and 410 methods spanning diverse field and method dependencies. Tests holistic OOP code generation with intra-class dependencies (method deps, field deps); no other registry entry specifically benchmarks class-level..


  In the atlas: ClassEval is an evaluation harness. Evaluation is the feedback loop that keeps every other harness honest — if you cannot measure the behaviour of the swap target, the swap is not really safe.

  '
