description: |
  CMB (Chinese Medical Benchmark) is Chinese University of HK (Shenzhen)'s comprehensive Chinese medical LLM benchmark covering exam QA (CMB-Exam) and complex clinical case consultation (CMB-Clin) across 28 departments. Only Chinese-specific medical benchmark in registry; dual tracks (exam MCQ + clinical dialogue); covers TCM and modern medicine. EMNLP 2024..

  In the atlas: CMB (Chinese Medical Benchmark) is an evaluation harness. Evaluation is the feedback loop that keeps every other harness honest — if you cannot measure the behaviour of the swap target, the swap is not really safe.
