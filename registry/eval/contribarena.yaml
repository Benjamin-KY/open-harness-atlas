sovereignty_notes: Single-maintainer community project (qWaitCrypto) under MIT; a live arena that measures whether autonomous agents can make meaningful open-source contributions (real PRs to real repos, judged by maintainer acceptance and lifecycle behaviour) rather than synthetic PR count. Model-agnostic 3 default — agents are pluggable behind a governance/control layer that decides what is allowed to touch GitHub. Early-stage and ambitious; treat the contribarena.org leaderboard as a live signal, not a stabilised benchmark.
