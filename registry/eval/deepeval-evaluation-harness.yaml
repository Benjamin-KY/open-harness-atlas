sovereignty_notes: 'sunilp303 (community User) maintains this MIT-licensed DeepEval scaffold supporting judge LLMs across Anthropic, AWS Bedrock, Azure OpenAI, and Vertex AI, with local offline embeddings as the default. Model-agnostic score 3 confirmed: multiple commercial-cloud LLM judge providers plus a local sentence-transformers embedding option; the judge LLM itself does not support local-weights, keeping score at 3 rather than 4. Free and self-hostable; comprehensive Makefile targets for CI/CD evaluation workflows.'
