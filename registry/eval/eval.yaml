sovereignty_notes: Ejentum (company — maintains the `ejentum.com` commercial cognitive-scaffold product) publishes ejentum/eval under MIT as a set of open-source A/B eval workflows in both n8n (visual, multi-turn agent-vs-agent + menu-RAG blind eval + single-turn producer-injection) and stdlib-only Python (multi-turn + single-turn orchestrators usable inside Claude Code / Codex / Cursor / MCP). Fairness guarantees are documented (same producer model on both sides, different-family judge, blind labels). Model-agnostic 2 — the shipped examples wire OpenAI producers to a Google Gemini Flash judge, and the patterns themselves are tool-agnostic but not provider-portable out of the box. Note that Ejentum's own reasoning tool is wired in as an example; the README is transparent about this.
