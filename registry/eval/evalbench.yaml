sovereignty_notes: 'Google Cloud (US-headquartered company) maintains EvalBench under Apache-2.0 as an NL2SQL evaluation framework for DQL/DML/DDL workloads, with `uv`-driven setup, BigQuery reporting and Vertex AI / Gemini as the documented model path. Model-agnostic 1: the configuration, auth (`gcloud auth application-default login`), examples and storage are single-vendor Google by default with custom modules required to extend elsewhere, so this is a single-primary-provider eval runner rather than a portable harness.'
