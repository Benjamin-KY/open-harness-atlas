tagline: "Customisable LLM / VLM / AIGC evaluation framework — performance benchmarks, RAG eval, and arena-style judging in a single CLI."
description: |
  EvalScope is Alibaba ModelScope's open-source LLM evaluation framework. Bundles standard benchmark runners (MMLU, GSM8K, HumanEval, C-Eval, CMMLU, the multilingual and Chinese-language benchmarks ModelScope ships), RAG-specific evaluation, vision-language eval, and arena-style pairwise-judge evaluation behind a single CLI and Python API. Designed to be the operator's one-stop eval harness across modalities.

  In the atlas: EvalScope is catalogued on the eval-framework shelf alongside lm-evaluation-harness, OpenCompass, deepeval, and inspect_ai. Distinct from single-benchmark runners because the deliverable is harness + adapter + reporter for many benchmarks rather than the benchmark itself.
maturity: ga
