model_agnostic_score: 5
sovereignty_notes: |
  Added 2026-06-15 via the v0.4.0 fresh-discovery sweep (8 gh-search topic queries, OSI-license filter, anti-laziness cross-reference against the existing 838 yaml files for both simple-id and owner-disambiguator collisions).
  Apache-2.0; runs locally. Model adapters cover ModelScope hub models, OpenAI, vLLM, Ollama, and any OpenAI-compatible endpoint. No call-home. Benchmarks are pulled from public datasets at first run and cached locally.
