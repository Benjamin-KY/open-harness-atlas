sovereignty_notes: evaleval (institution-maintained, EvalEval Coalition researcher community publishing through evalevalai.com); OSS under MIT, distributed as the `every-eval-ever` Python package with optional `[inspect]`, `[helm]`, `[all]` extras. Model-agnostic 3 — Every Eval Ever is a metadata schema and converter layer rather than an LLM client, so the schema applies uniformly across leaderboard scrapes, paper results, and local evaluation runs from any provider. Operates more as an eval-schema / eval-database than a runner; catalogued under the closest existing agent-eval subcategory.
