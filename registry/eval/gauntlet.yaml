sovereignty_notes: Basaltlabs-app (community individual maintainer on GitHub); MIT-licensed PyPI behavioural benchmark with 240 probes designed to expose how quantization (FP16 → Q4) degrades sycophancy resistance, instruction following, confidence calibration and prompt-injection resistance — not just perplexity. Model-agnostic 4 — first-class LM Studio and llama.cpp drivers with optional MCP server endpoint; results aggregated into a community leaderboard scored per-hardware-configuration. Small but actively iterated (v2.1.1).
