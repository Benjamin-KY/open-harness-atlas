sovereignty_notes: 'Vectara is US-incorporated (Palo Alto); the leaderboard scripts,

  methodology, source documents, and the HHEM classifier are all

  Apache-2.0 OSS and run entirely offline. Multi-provider via simple

  prompt-completion calls — works against any OpenAI-compatible

  endpoint including local vLLM / Ollama / TGI. The hosted Vectara

  RAG platform is a separate commercial offering; the leaderboard

  itself has no Vectara-service dependency.

  '
