tagline: Stanford CRFM's holistic, multi-metric LLM evaluation across accuracy, calibration, robustness, fairness, bias, toxicity, and efficiency.
description: 'HELM is the Stanford Center for Research on Foundation Models''

  Apache-2.0 evaluation framework, distinguished by its **holistic**

  multi-metric design: every scenario is scored on accuracy,

  calibration, robustness, fairness, bias, toxicity, and efficiency

  (where applicable), not on accuracy alone. HELM ships several

  benchmark suites (HELM Lite, HELM MMLU, HELM Classic, HELM Safety,

  HELM Capabilities) and publishes leaderboards as a public good.


  In the atlas: HELM is the canonical **holistic, multi-metric eval

  harness**. Where lm-evaluation-harness optimises for breadth of

  tasks, HELM optimises for breadth of metrics on the same task —

  useful when the question is "what trade-offs does this model

  make?" rather than "what score does it post?".

  '
