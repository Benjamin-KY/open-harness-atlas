tagline: Princeton NLP's long-context evaluation benchmark — seven application-oriented categories scored against models with up to 128k-token context.
description: 'HELMET (How to Evaluate Long-context Models Effectively and

  Thoroughly) is the Princeton NLP MIT-licensed benchmark suite for

  long-context language-model evaluation. It scores models across

  seven application-oriented categories — retrieval-augmented

  generation, passkey-style retrieval, citation, re-ranking,

  long-document QA, summarisation, and many-shot in-context

  learning — at context lengths up to 128k tokens. The benchmark

  is designed to surface the gap between "needle-in-haystack"

  micro-tests and the realistic long-context workloads operators

  actually run.


  In the atlas: HELMET is the **long-context evaluation** point in

  the eval space — adjacent to LiveBench (contamination-resistant

  general capability) and lm-evaluation-harness (general-purpose

  evaluation runner). Operators selecting a model for

  long-document-RAG or large-codebase workloads use HELMET as the

  application-realistic ceiling test for context-length capability.

  '
