tagline: UK AI Safety Institute's framework for large-language-model safety and capability evaluations.
description: |
  Inspect AI is the UK AI Safety Institute's (UK AISI) open-source
  framework for large-language-model evaluations, with a particular
  emphasis on safety and capability assessments. It provides a
  task-and-solver abstraction (a `Task` is a dataset + a `Solver`
  pipeline + a `Scorer`), pluggable model providers (OpenAI,
  Anthropic, Google, Hugging Face, Mistral, Together, vLLM, Ollama,
  Bedrock, Vertex), an interactive log viewer, and well-instrumented
  primitives for tool-use, multi-turn conversation, and
  human-in-the-loop scoring.

  In the atlas: Inspect AI is the canonical **government-grade
  safety-eval harness**. It is the framework used by UK AISI for
  pre-deployment safety evaluations of frontier models and a number
  of open replications of those evaluations. Including it in the
  atlas signals that government-quality eval infrastructure is OSS,
  jurisdiction-portable, and not gated to UK use.
