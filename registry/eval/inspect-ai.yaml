sovereignty_notes: |
  UK government institute; MIT-licensed; runs entirely locally;
  any OpenAI-compatible local backend is a first-class model option.
  Notable for being a government-grade safety-eval framework that is
  unambiguously OSS and unambiguously portable across jurisdictions —
  one of the cleanest counter-examples to the closed-garden
  trend named in CHARTER. Model-agnostic 5 — provider is a config
  string and the same task runs against any supported backend.
