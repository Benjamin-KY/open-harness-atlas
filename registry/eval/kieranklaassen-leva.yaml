id: kieranklaassen-leva
name: "Kieranklaassen Leva"

category: eval
subcategory: ruby-llm-eval

repo_url: https://github.com/kieranklaassen/leva
license: MIT
primary_language: Ruby

tagline: "Production-data LLM evaluation framework for Ruby on Rails apps."

description: |
  Leva (kieranklaassen) is an LLM evaluation framework designed for Ruby on Rails applications, focused on evaluating production data (not synthetic test sets). Integrates with ActiveRecord and Rails background-job infrastructure.

  In the atlas: fills the Ruby-ecosystem gap in eval. Peer to `langfuse` and `langwatch` on the production-traces side; differentiator is Rails-native.

