sovereignty_notes: |
  Added 2026-06-14 via the second recency-biased discovery sweep (non-agent categories: routing / redteam / eval).
  MIT licence; Ruby gem; runs inside the host Rails app. Evaluation judge is whatever LLM the app already uses. Provider-agnostic.

