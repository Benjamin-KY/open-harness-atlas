id: lighteval
name: Lighteval
category: eval
subcategory: academic-benchmark-runner
repo_url: https://github.com/huggingface/lighteval
homepage: https://github.com/huggingface/lighteval
license: MIT
primary_language: Python
tagline: Hugging Face's lightweight, fast LLM evaluation suite with multiple backends and Open-LLM-Leaderboard compatibility.
description: |
  Lighteval is Hugging Face's MIT-licensed lightweight evaluation
  framework, designed as a faster, more modular alternative to running
  the full lm-evaluation-harness for everyday evaluations. It supports
  multiple inference backends (Hugging Face transformers, accelerate,
  vLLM, Nanotron, OpenAI-compatible endpoints), is the framework
  behind the Open LLM Leaderboard v2 task definitions, and is designed
  to be modifiable for custom benchmarks without forking the harness.

  In the atlas: Lighteval is the **fast-iteration academic eval
  alternative**. Lower coverage than lm-evaluation-harness, but
  faster to run and easier to extend — useful as the inner-loop
  eval during model post-training, with lm-evaluation-harness
  reserved for the publication-grade run.
maturity: beta
