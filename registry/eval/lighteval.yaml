    url: https://github.com/huggingface/lighteval#readme
    type: docs
    free: true
sovereignty_notes: |
  Hugging Face (French-incorporated company, multi-jurisdiction
  operation); MIT-licensed; runs entirely locally with multiple
  inference backends. Conservative model-agnostic 4 — non-Hugging-
  Face backends (vLLM, OpenAI-compatible) are supported but most
  examples and documentation assume the HF transformers path.
