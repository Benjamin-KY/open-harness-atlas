sovereignty_notes: Google LLC (company-maintained; Apache-2.0). Litmus runs as a Vertex-AI / Cloud Run-friendly stack but the OSS code is provider-agnostic in principle; MAS=3 retained pending verification of local-weights support in the worker. Harness alignment partial — strong output_contract footprint (Ragas faithfulness/harmfulness, DeepEval bias/toxicity, golden-answer assertion) and an audit-friendly proxy layer, but no policy_router or refusal FSM. US origin (Google HQ).
