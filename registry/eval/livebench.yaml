sovereignty_notes: 'The benchmark scripts and historical question sets are

  Apache-2.0 OSS and run entirely offline against any

  chat-completion endpoint. The official leaderboard at

  livebench.ai is a hosted service; submitting to it requires

  uploading model outputs but the benchmark can be run privately

  without disclosing scores. Provider-neutral: works against any

  OpenAI-compatible endpoint including local vLLM / Ollama.

  '
