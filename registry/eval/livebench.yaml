tagline: Contamination-resistant LLM benchmark whose questions are rotated monthly from frontier-fresh sources — math competitions, IPCC reports, arXiv abstracts.
description: 'LiveBench is a benchmark designed by Abacus AI and NYU to defeat

  training-data contamination by rotating its question pool from

  sources that post-date most pre-training cutoffs: current math

  competitions, recent arXiv abstracts, IPCC reports, news from the

  past month. Every question has a verifiable ground-truth answer;

  scoring is automatic. The benchmark covers six categories (math,

  reasoning, coding, language, instruction-following, data analysis)

  and publishes a rolling leaderboard.


  In the atlas: LiveBench is the **contamination-resistant**

  benchmark counterpart to ARC-AGI in the eval space. Where ARC-AGI

  uses a static private test set with procedurally-generated tasks,

  LiveBench achieves contamination resistance through monthly

  rotation of fresh real-world content. Both belong on an

  operator''s "ceiling test" shortlist for any model whose training

  cutoff is plausibly older than the live test items.

  '
