sovereignty_notes: Single-maintainer community project (omarnagy91) under MIT; ~667 LOC Python CI gate that scaffolds a golden regression set from production traces, runs grouped graders (facts, hallucination traps, relevance, tool calls, format, rubric LLM-judge), and exits non-zero on regression vs baseline. Model-agnostic 3 default — the rubric judge can be swapped behind config; provider coverage is not the project's pitch. Useful as a lean PR-time eval gate; pair with a heavier eval suite for coverage.
