sovereignty_notes: 'Victor-David-Medina (community / individual) ships llm-eval-harness under MIT as a deliberately small, stdlib-only Python evaluation harness designed to be read end-to-end by a reviewer — golden-set JSONL inputs are scored on grounding, faithfulness (contradiction + invented-number flags), relevance and exact-keyword presence, then compared against a baseline and tiered into info/warn/critical with a non-zero CI exit. Model-agnostic 4: because the harness consumes JSONL outputs and only invokes LLM-as-judge on the free-form dims, provider choice is essentially orthogonal to the runner. Partial coverage for output_contract / audit_log_fsm / source_authority is earned by the tier policy, the recorded baseline-vs-current diff and the grounding/faithfulness checks.'
