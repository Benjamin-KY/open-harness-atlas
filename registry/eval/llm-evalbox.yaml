sovereignty_notes: Single-maintainer community project (Chedrian07) under Apache-2.0; provider-agnostic CLI + local Web UI that runs 16 bundled benchmarks against any OpenAI-compatible endpoint (Chat Completions or Responses), with stratified sampling, Wilson CI95, p50/p95 latency, full token accounting (including reasoning/cached), and an opt-in RLIMIT/timeout subprocess sandbox for code benchmarks. Model-agnostic 4 — provider = BASE_URL + MODEL_NAME, with capability shims for o-series, gpt-5 family, Qwen3 thinking modes, GLM-4.5+, DeepSeek-R1, Claude via OpenRouter, and Gemini.
