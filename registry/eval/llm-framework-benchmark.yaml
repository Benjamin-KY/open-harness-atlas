description: 'LLM Framework Benchmark — Can an AI coding agent build the same framework-neutral spec on different stacks? External-oracle-graded benchmark. First: Spring Boot vs Tiko DI. Upstream maintainer: tomas-samek.


  In the atlas: this is an evaluation harness. Evaluation is the feedback loop that keeps every other harness honest — if you cannot measure the behaviour of the swap target, the swap is not really safe.'
