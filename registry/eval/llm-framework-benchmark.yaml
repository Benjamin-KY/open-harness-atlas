sovereignty_notes: tomas-samek (community individual maintainer on GitHub); MIT eval harness that holds spec and scaffold constant and varies the framework + model, scored by an independent oracle rather than the agent's own tests. Model-agnostic 3 — runs Sonnet 4.6 and Opus 4.8 in the published results; the harness itself is framework-/model-agnostic. Small footprint (1 star) but methodologically interesting — the headline 'frontier models score 0% on Spring Boot 4.0.6 vs 100% on 3.3.5' result is a useful version-recency probe.
