sovereignty_notes: |
  EleutherAI — independent non-profit research lab (multi-country
  contributor base). MIT-licensed; runs entirely locally; any
  OpenAI-compatible local backend (vLLM, llama.cpp, Ollama) is a
  first-class model option. Model-agnostic 5 — the same task YAML runs
  against any supported backend with no code change.
