tagline: De facto academic standard for few-shot LLM benchmark evaluation across 200+ tasks.
description: |
  lm-evaluation-harness (often abbreviated `lm-eval` or `lm-eval-harness`)
  is the de facto academic standard for running few-shot benchmark
  evaluations against language models. It ships ~200+ tasks (MMLU, ARC,
  HellaSwag, TruthfulQA, GSM8K, BBH, IFEval, AGIEval, MATH, GPQA, and
  many more), pluggable model backends (Hugging Face transformers,
  vLLM, OpenAI-compatible endpoints, llama.cpp, Anthropic, Cohere), and
  a reproducible task-definition YAML format used in most major
  open-weights model releases.

  In the atlas: lm-evaluation-harness is the canonical
  **academic-benchmark eval harness** — the one new open-weights
  releases score against to publish a leaderboard-comparable
  evaluation. It composes cleanly under any harness governance /
  routing layer because it treats the model as a pluggable backend.
