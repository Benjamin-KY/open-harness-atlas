description: |
  LMMs-Eval is NTU / UCSB's single harness for evaluating large multimodal models across 50+ vision-language benchmarks. Covers image, video, document understanding in one framework; interleaved image-text.

  In the atlas: LMMs-Eval is an evaluation harness. Evaluation is the feedback loop that keeps every other harness honest — if you cannot measure the behaviour of the swap target, the swap is not really safe.
