description: |
  Long-Form Factuality / SAFE is Google DeepMind's sAFE (Search-Augmented Factuality Evaluator) automatically decomposes long-form responses into atomic claims verified via Google Search. Search-grounded factuality evaluation at sentence-claim granularity; introduces F1@K metric extending precision/recall to long-form outputs; distinct from FActScore..

  In the atlas: Long-Form Factuality / SAFE is an evaluation harness. Evaluation is the feedback loop that keeps every other harness honest — if you cannot measure the behaviour of the swap target, the swap is not really safe.
