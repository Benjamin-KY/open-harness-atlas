description: |
  LongBench (v1 + v2) is Tsinghua University KEG / Zhipu AI's bilingual long-context benchmark with 21 tasks (4.5K–200K tokens) covering single/multi-doc QA, summarization, few-shot, and code; v2 adds 8K–2M range. First bilingual long-context benchmark; v2's 2M-token ceiling and human-expert difficulty; covers both understanding and generation unlike Needle-in-Haystack..

  In the atlas: LongBench (v1 + v2) is an evaluation harness. Evaluation is the feedback loop that keeps every other harness honest — if you cannot measure the behaviour of the swap target, the swap is not really safe.
