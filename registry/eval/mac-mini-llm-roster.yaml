sovereignty_notes: 'slogsdon (community / individual) publishes mac-mini-llm-roster under MIT as raw benchmark data, run logs and Python scripts for six Mac Mini M4 Ollama runs (roster_speed_test + maxctx variants) — explicitly written as the data side of a forthcoming blog post. Model-agnostic 3: scripts call Ollama directly, deliberately bypassing the LiteLLM gateway because LiteLLM strips Ollama''s `eval_count`/`thinking` fields, so the benchmarking artefact is local-weights single-engine even though production traffic in the author''s stack routes through LiteLLM + Langfuse + OTel.'
