sovereignty_notes: 'tonykoop (community/individual maintainer) ships MakerBench HWE under Apache-2.0; the harness, oracles, parts catalog, and CI selftest all live in the repo and run headlessly on free tooling (OpenSCAD + trimesh/manifold3d). Model-agnostic 3 is correct: model selection is via OpenAI-compatible config and the grader is provider-blind, but the README does not specifically pitch local-weights first-class. Noteworthy flag: the repo ships a do-not-train canary (`makerbench-canary GUID f3587531-…`) and is published as benchmark integrity material.'
