sovereignty_notes: Neal006 (community individual maintainer on GitHub); MIT Python benchmark designed specifically to quantify LLM memory decay — runs multi-seed experiments across Naive eviction, Ideal/Chunked RAG, Cascading Temporal (Ebbinghaus) and Summary backends, reporting recall@T, tokens/query and cascade efficiency. Model-agnostic 3 — ships an offline 'no API key' mode for reproducibility plus a 5-provider mode for real eval. Small footprint (7 stars) but methodologically careful, with documented limitations (e.g. zero-variance regimes).
