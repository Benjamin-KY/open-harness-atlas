sovereignty_notes: mnemebrain (community Organization) maintains this MIT-licensed benchmark suite evaluating belief dynamics in AI memory systems across 48 tasks covering contradiction detection, belief revision, temporal decay, and multi-hop retrieval. Model-agnostic score 3 is a reasonable default; the benchmark is adapter-based and provider-agnostic for the tested memory system, while the scoring runner can use any compatible LLM backend. Last pushed 2026-03-13.
