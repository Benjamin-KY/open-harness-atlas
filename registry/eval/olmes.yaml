description: |
  OLMES is Allen AI (AI2)'s standardised eval system used for AI2 OLMo model releases with reproducible benchmark configs. Wraps lm-eval-harness but adds curated versioned task configs and decontamination.

  In the atlas: OLMES is an evaluation harness. Evaluation is the feedback loop that keeps every other harness honest — if you cannot measure the behaviour of the swap target, the swap is not really safe.
