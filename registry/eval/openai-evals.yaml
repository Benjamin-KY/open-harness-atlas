  name: OpenAI
origin_country: US
model_agnostic_score: 3
education_resources:
  - title: OpenAI Evals — Documentation
    url: https://github.com/openai/evals/blob/main/docs/eval-templates.md
    type: docs
    free: true
sovereignty_notes: |
  US-incorporated company; OSS framework is MIT-licensed and runs
  entirely locally. The framework is more idiomatic against OpenAI's
  own completion API; running against non-OpenAI backends requires a
  custom `CompletionFn` wrapper (LiteLLM is a common adapter).
  Conservative model-agnostic 3 — the framework works against any
  backend with adapter code, but the out-of-box ergonomics assume
  OpenAI; community evals frequently embed OpenAI-specific
  assumptions in graders.
harness_paradigm_alignment: partial
