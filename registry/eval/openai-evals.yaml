tagline: OpenAI's framework and registry of evaluations for LLMs and LLM-using systems.
description: |
  OpenAI Evals is OpenAI's MIT-licensed evaluation framework and
  registry of evaluations for language models and the systems that
  use them. It defines an `Eval` abstraction (dataset + grading
  logic + completion function), ships a registry of community-
  contributed evals, and supports YAML-defined evals for the common
  cases (multiple-choice, model-graded, custom-grader).

  In the atlas: OpenAI Evals is included as the **OpenAI-origin
  application-level eval** — historically influential, MIT-licensed,
  and still in active use even though the field has largely shifted
  to lm-evaluation-harness (academic) and DeepEval / promptfoo
  (application). Its presence in the atlas demonstrates that
  OpenAI-origin OSS evaluation infrastructure is OSI-licensed and
  portable to any backend, even though hosted Fable / Mythos-class
  *models* may not be.
maturity: ga
