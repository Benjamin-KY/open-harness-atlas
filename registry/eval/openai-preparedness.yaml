tagline: OpenAI's open-source releases supporting the Preparedness Framework — frontier-risk evaluation methodology (cybersecurity, biosecurity, autonomy).
description: 'OpenAI''s `openai/preparedness` repository is the official

  open-source release of evaluation methodology, harnesses, and

  reproduction code supporting OpenAI''s Preparedness Framework —

  the company''s commitment to evaluate frontier models for

  catastrophic risk capabilities across cybersecurity, CBRN, model

  autonomy, and persuasion before deployment. It is the upstream

  source for evaluation harnesses described in OpenAI''s model

  system cards.


  In the atlas: openai-preparedness is the **frontier-risk

  evaluation** subcategory point — adjacent in spirit to METR''s

  task-standard, the UK AI Security Institute''s evals, and

  Anthropic''s Responsible Scaling Policy methodology. Operators

  evaluating frontier-class deployments use these harnesses both

  as primary signal and as a comparability anchor against

  published OpenAI model cards. Catalogued separately from

  OpenAI''s general `openai-cookbook` because the deliverable is

  risk-eval methodology, not tutorial content.

  '
