sovereignty_notes: 'OpenAI is US-incorporated; the released methodology and code is

  MIT-licensed and runs offline against any chat-completion

  endpoint that the operator can call. The harnesses are written

  against OpenAI SDK conventions but the abstractions accept any

  OpenAI-compatible backend (vLLM / Ollama / TGI / local). No

  required hosted dependency beyond whichever model is being

  evaluated.

  '
