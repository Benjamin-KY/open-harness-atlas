sovereignty_notes: 'Langfuse GmbH (Berlin) maintains this template as a reference deployment of its commercial-OSS LLMOps stack; the stack itself is MIT and self-hostable, but the curated artefact here is a compose recipe rather than a standalone tool. Model-agnostic 3 because the bundled LiteLLM gateway brokers commercial APIs alongside local-weights backends (Ollama, vLLM) through one OpenAI-compatible surface. Note the repo README is intentionally thin — verification leaned on the upstream Langfuse and LiteLLM project pages it points to. Harness alignment is partial: it ships observability + eval feedback but no policy router or output contract of its own.'
