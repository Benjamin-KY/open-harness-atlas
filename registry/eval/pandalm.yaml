description: |
  PandaLM is WeOpenML (Peking U / Westlake U)'s reproducible automated LLM judge (7B) for instruction-tuning comparison with a 1000-sample human-annotated test set; achieves 93.75% of GPT-3.5 F1. Provides human-validated test set and reproducible judgment; privacy-safe local evaluation for confidential data unlike GPT-4-as-judge approaches..

  In the atlas: PandaLM is an evaluation harness. Evaluation is the feedback loop that keeps every other harness honest — if you cannot measure the behaviour of the swap target, the swap is not really safe.
