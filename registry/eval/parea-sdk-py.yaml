sovereignty_notes: parea-ai (company) publishes parea-sdk-py under Apache-2.0 as the open client SDK for the Parea AI evaluation/observability platform. Model-agnostic 3 reflects the README's coverage of OpenAI, Anthropic, and integrations into LangChain / Instructor / DSPy / LiteLLM (which itself routes to local backends), without the SDK pinning a provider. Note that the richest workflows assume a Parea AI hosted account/API key; the SDK is OSS and self-hostable for its trace/eval primitives but the managed UI is a paid service — only the OSS SDK is the catalogued artefact.
