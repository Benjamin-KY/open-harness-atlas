sovereignty_notes: 'tenurehq (company, US — maintains the commercial `tenure` memory system that is among the providers benchmarked here) publishes PrecisionMemBench under MIT, with an accompanying arXiv paper, HuggingFace dataset and HuggingFace Spaces leaderboard. 89 cases scoring retrieval precision, noise isolation under multi-turn drift, session-load latency and belief mutability — a useful eval runner with a careful pass taxonomy (active / structural / trivially empty). Sovereignty caveat: the maintainer''s own `tenure` product currently leads the leaderboard, so the benchmark is reference-quality but not vendor-neutral by lineage; reproducibility is the mitigation. Model-agnostic 3 is the right rubric value (multi-target, multi-embedding-model).'
