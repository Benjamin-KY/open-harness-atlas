description: |
  PromptBench is Microsoft Research's lLM eval toolkit with adversarial prompt robustness testing, dynamic DyVal eval, prompt-engineering comparison. Only framework with formal adversarial prompt attack suite (char/word/sentence/semantic vectors).

  In the atlas: PromptBench is an evaluation harness. Evaluation is the feedback loop that keeps every other harness honest — if you cannot measure the behaviour of the swap target, the swap is not really safe.
