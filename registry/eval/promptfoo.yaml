sovereignty_notes: 'US-incorporated company; OSS CLI + viewer are MIT-licensed and
  run

  entirely locally; no telemetry by default. Provider config is a

  string, so swapping among OpenAI / Anthropic / local Ollama / vLLM

  is a one-line change. Model-agnostic 5 — the YAML config is the

  same file regardless of which providers are listed under it.

  '
