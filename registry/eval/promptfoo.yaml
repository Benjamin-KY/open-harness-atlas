id: promptfoo
name: promptfoo
category: eval
subcategory: application-level-eval
repo_url: https://github.com/promptfoo/promptfoo
homepage: https://www.promptfoo.dev/
license: MIT
primary_language: TypeScript
tagline: Declarative test-driven evaluation of LLM applications with side-by-side
  prompt and model comparisons.
description: 'promptfoo is an MIT-licensed CLI and library for declarative,

  test-driven LLM evaluation. A YAML config defines prompts, providers

  (any of 50+ supported), and test cases with assertions (exact

  match, regex, JSON schema, LLM-as-judge, latency, cost, custom

  Python / JavaScript). The CLI runs the matrix and produces a

  shareable HTML / web report with side-by-side prompt-vs-prompt or

  model-vs-model diffs. It also includes red-team / scan modes for

  jailbreak, prompt-injection, and harmful-content probes.


  In the atlas: promptfoo is the canonical **application-level

  test-driven eval harness**. Where DeepEval mirrors pytest, promptfoo

  mirrors a declarative test matrix — useful when the comparison axis

  is the prompt or the provider rather than the application logic.

  '
