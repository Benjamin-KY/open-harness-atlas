sovereignty_notes: 'Microsoft (US commercial company) publishes Prompty under MIT: a markdown-with-YAML-frontmatter prompt asset format (.prompty) plus runtimes for Python, TypeScript and a VS Code extension, with tracing, scoped ${file:} variable references, and pluggable provider packages (OpenAI, Microsoft Foundry, Anthropic). Model-agnostic 2 — multi-provider but the documented integrations are commercial APIs; local-weights paths are not first-class in v2 alpha. Aligned with the harness paradigm because the prompt-composer slot scores native (a single .prompty file IS the system-role surface) and output_contract scores partial via schema-validated frontmatter and host-controlled filesystem-root allowlists.'
