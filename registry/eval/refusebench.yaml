sovereignty_notes: 'Single-maintainer (gimocimo; MIT) benchmark measuring spec-gaming — how often LLMs cut corners on embedded constraints under realistic pressure — across 11 frontier models with 10 policy-rich scenarios, 129 rules, and a 3-vendor LLM-judge committee calibrated against blind human labels (Cohen''s κ 0.74-0.79). Model-agnostic 4 because the runner is provider-agnostic and the published leaderboard already spans Anthropic / OpenAI / Google / Mistral; local-backend evaluation is mechanically the same. Alignment ''partial'': it is a refusal-axis eval, not a harness — but the spec-gaming framing is exactly the gap an Output Contract addresses.'
