sovereignty_notes: HPAI-BSC (institution; High-Performance AI group, Barcelona Supercomputing Center, Spain) publishes TuRTLe under Apache-2.0 — a unified evaluation framework for LLMs on RTL generation across VerilogEval, RTLLM, VGen, RTL-Repo and a new Tiny Tapeout NotSoTiny benchmark, with Icarus Verilog / Verilator (syntax + functionality), Yosys (synthesis + equivalence) and LibreLane / OpenROAD (PPA) as deterministic graders. Model-agnostic 3 reflects API inference via any OpenAI-compatible endpoint (OpenRouter, OpenAI, Azure) plus multi-node Ray-based local inference. Published as MLCAD 2025 paper (arXiv:2504.01986) and a live Hugging Face leaderboard — reference-quality.
