description: |
  Unitxt is IBM Research's flexible NLP evaluation library with composable building blocks: datasets, templates, metrics, formats. 300+ metrics, 500+ datasets in composable catalog; prompt-template sensitivity studies.

  In the atlas: Unitxt is an evaluation harness. Evaluation is the feedback loop that keeps every other harness honest — if you cannot measure the behaviour of the swap target, the swap is not really safe.
