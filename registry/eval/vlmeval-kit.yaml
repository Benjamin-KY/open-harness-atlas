tagline: 'All-in-one evaluation toolkit for large vision-language models supporting 70+ VLMs and 50+ benchmarks including MMBench, MME, SEED, and MMMU'
description: |
  VLMEvalKit is OpenCompass / Shanghai AI Lab's all-in-one evaluation toolkit for large vision-language models supporting 70+ VLMs and 50+ benchmarks including MMBench, MME, SEED, and MMMU. Unified VLM inference + evaluation harness; unlike lmms-eval it focuses on VLMs specifically with broader model support and CircularEval correction..

  In the atlas: VLMEvalKit is an evaluation harness. Evaluation is the feedback loop that keeps every other harness honest — if you cannot measure the behaviour of the swap target, the swap is not really safe.
