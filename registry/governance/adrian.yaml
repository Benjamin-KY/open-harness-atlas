sovereignty_notes: 'secureagentics (company-maintained GitHub Organization behind Secure Agentics, with a managed dashboard at app.adrian.secureagentics.ai); OSS SDK under Apache 2.0, distributed as `adrian-sdk` on PyPI with two-line LangChain/LangGraph instrumentation. Model-agnostic 3 — Adrian observes and intervenes on agent tool calls and reasoning traces rather than acting as an LLM client, so it works with whichever provider the host LangChain agent is configured for. Recategorised from redteam → governance / runtime-security: AARM-aligned defensive intervention (policy_router partial via audit/block modes and remit gating; audit_log_fsm partial via activity-log + reasoning-trace persistence) is the correct framing for an in-flight guardrail engine.'
