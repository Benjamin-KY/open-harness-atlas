sovereignty_notes: mauhpr (community / individual maintainer) ships agentlint under MIT — real-time guardrails with 77 rules across 8 packs (universal / quality / Python / security / autopilot, plus auto-activating language packs) that block ERROR-rated actions, inject context for WARNINGs, and report INFOs in session summaries. Model-agnostic 3 reflects normalisation across many host adapters (Claude Code, Cursor, Kimi, Grok, Gemini, Codex, Continue.dev, OpenAI Agents SDK, MCP hosts). Policy-router `partial` (rules intercept tool events before execution) and audit-log `partial` (session reports, token-burn budgets, durable queue / dashboard pairing) reflect the README's stated surface; the local-first NVD enforcement (`no-nvd-critical-cve-install`) is a noteworthy supply-chain guardrail.
