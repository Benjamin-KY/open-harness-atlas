tagline: 'DSL and Rust compiler for type-safe LLM prompt functions with multi-language client generation and streaming'
description: |
  BAML is BoundaryML's dSL and Rust compiler for type-safe LLM prompt functions with multi-language client generation and streaming. Defines prompts as strongly-typed functions in a purpose-built DSL; Rust compiler emits Python/TS/Ruby/Go clients; supports partial streaming types and retry logic natively — no equivalent in outlines, guidance, or instructor which operate purely at Python runtime..

  In the atlas: BAML is a governance-layer entry. Where it lands on the five-component spine (policy router / source authority / prompt composer / output contract / audit-log FSM) is captured in `five_component_coverage` below.
