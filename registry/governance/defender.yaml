sovereignty_notes: 'StackOne (commercial vendor at stackone.com); Apache-2.0 TypeScript guardrail that intercepts tool results before they reach the LLM. Three tiers: pattern detection (Unicode normalisation, role stripping, encoding detection), bundled ONNX multi-head MiniLM classifier (~22MB, ~10ms, F1 0.91 average across Qualifire/xxz224/jayavibhav), and an opt-in consumer-supplied Tier-3 LLM. Model-agnostic 3 — the defender itself is local and provider-neutral. Recategorised from redteam to governance/guardrails since the implementation defends, not probes.'
