  type: company
  name: Evidently AI

origin_country: US

model_agnostic_score: 5

five_component_coverage:
  policy_router: none
  source_authority: none
  prompt_composer: none
  output_contract: partial
  audit_log_fsm: native

sovereignty_notes: |
  Added 2026-06-14 via the awesome-list discovery sweep (GraphQL-batched parser; >= 2-list endorsement).
  Apache-2.0; self-hosted Python library + optional self-hosted UI service. No managed-service dependency. Observability data goes wherever the operator routes it. Vendor-neutral metrics; works with any LLM provider.

harness_paradigm_alignment: aligned

deployment_posture: local-first

