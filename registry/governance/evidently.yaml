category: governance
subcategory: llm-observability

repo_url: https://github.com/evidentlyai/evidently
homepage: https://discord.gg/xZjKRaNp8b
license: Apache-2.0
primary_language: Jupyter Notebook

tagline: "Open-source ML + LLM observability framework — evaluate, test, monitor."

description: |
  Evidently is an open-source observability framework for ML and LLM systems. 100+ pre-built metrics, drift detection, prompt-eval tests, dashboards, and a Python SDK that drops into existing pipelines.

  In the atlas: peer to `langfuse`, `arize-phoenix`, `openllmetry`, `langwatch` on the observability shelf. Differentiator is the dual ML + LLM coverage (useful in mixed-stack environments).

maturity: ga

