tagline: 'Pythonic LangChain-backed library that turns annotated Python functions into LLM chains with Pydantic output parsing'
description: |
  funcchain is Dominic Bäumer's pythonic LangChain-backed library that turns annotated Python functions into LLM chains with Pydantic output parsing. Uses Python function signatures + docstrings as the prompt; compiles to LangChain LCEL runnables for compatibility; supports llama.cpp grammar mode and Ollama; smaller and more idiomatic than funcchain-alternatives like guidance or instructor for simple use-cases. Low recent activity (~2024)..

  In the atlas: funcchain is a governance-layer entry. Where it lands on the five-component spine (policy router / source authority / prompt composer / output contract / audit-log FSM) is captured in `five_component_coverage` below.
