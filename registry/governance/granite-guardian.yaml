tagline: IBM's openly-licensed risk-and-harm classifier family for upstream input / output filtering.
description: |
  Granite Guardian is IBM's family of small classifier models (3B–8B)
  released under Apache-2.0 that score LLM inputs and outputs against a
  catalogue of risk categories (harm, bias, jailbreak attempt, profanity,
  unethical behaviour, RAG context grounding, function-call safety). The
  models are designed to sit at the boundaries of a deployed LLM as a
  cheap, deterministic-budget filter before / after a more expensive
  frontier call.

  In the atlas: Granite Guardian is the canonical example of an
  **openly-licensed classifier-model** harness component — not a
  framework but a load-bearing input/output rail you plug into any other
  governance harness (NeMo Guardrails, Guardrails AI, your own
  composition). Apache-2.0 weights make it usable as a fully local rail
  with no third-party API call.
