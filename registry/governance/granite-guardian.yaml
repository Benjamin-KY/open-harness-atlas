sovereignty_notes: |
  IBM-maintained, Apache-2.0 for both code and model weights — fully
  redistributable, fully self-hostable. Runs on any local inference
  stack that handles the model architecture (vLLM, Transformers,
  Ollama once converted, llama.cpp). No telemetry by construction
  (it is a model, not a service). Model-agnostic 5 because the
  classifier is a single artefact that integrates into any harness via
  whichever inference backend the operator chooses.
