repo_url: https://github.com/guardrails-ai/guardrails
homepage: https://www.guardrailsai.com/
license: Apache-2.0
primary_language: Python
tagline: Pydantic-style validator chains that wrap LLM outputs in enforceable contracts.
description: |
  Guardrails is a Python framework for defining and running structured
  validators over LLM outputs. A `Guard` object wraps any LLM call; the
  declared validator chain runs on the model's response and either
  passes the value through, repairs it, or raises (with optional reask
  loop). Validators are composable — schema validation, regex, toxicity
  classifiers, hallucination detectors, custom code — and the catalogue
  lives in the **Guardrails Hub** as a public, pip-installable registry.

  In the atlas: Guardrails AI is the cleanest **validator-first**
  expression of the output-contract invariant. It does not attempt to
  route, compose system prompts, or manage escalation FSMs — those are
  intentionally out of scope. Pair with a separate router and prompt
  composer for a full five-component spine.
