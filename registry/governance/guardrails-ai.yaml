sovereignty_notes: |
  US-incorporated company; OSS core is Apache-2.0 and fully self-hostable.
  Provider-agnostic via the LiteLLM integration and direct adapters for
  OpenAI / Anthropic / Cohere / Hugging Face / Ollama / local
  OpenAI-compatible endpoints. Validators run locally; no telemetry
  by default. Validator hub is a separate optional service —
  validators themselves are installable as pip packages, so the runtime
  is self-contained.
