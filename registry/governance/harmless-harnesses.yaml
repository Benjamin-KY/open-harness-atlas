sovereignty_notes: 'Maintained by an independent Indigenous Australian author; affiliation

  with Jeff Bleich Centre for Democracy and Disruptive Technologies,

  Flinders University. Code dual-licensed Apache-2.0 (code) and

  CC BY-SA 4.0 (content). Fully self-hostable; default mock adapter

  runs the entire course offline. Live-model adapter supports any

  OpenAI-compatible endpoint including local Ollama / vLLM / llama.cpp.

  Model-agnostic 4 (not 5) because some Practitioner-track exercises

  depend on provider-specific tool-call formats that require small

  per-provider adjustments.

