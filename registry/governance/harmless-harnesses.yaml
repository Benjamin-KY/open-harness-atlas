description: 'Harmless Harnesses is a two-track code course (Concept + Practitioner,

  with a shared Foundation and a Tensions track) on governance harnesses

  for LLMs in regulated and high-stakes settings. It ships a reference

  Python package (`harmless_harness`), four worked domains (SA

  governance, IT helpdesk, compliance Q&A, financial services), 22

  red-team probes, and an L1–L4 conformance ladder.


  In the atlas: Harmless Harnesses is included as a governance entry

  because the `src/harmless_harness/` package is itself a functioning,

  reference-quality implementation of the five-component spine the

  atlas scores other entries against. It is also the **pedagogical

  sibling of this atlas** — `open-harness-atlas` catalogues OSS

  components; Harmless Harnesses teaches how to compose them. See

  [`CHARTER.md`](../../CHARTER.md) for the relationship.


  **Conflict of interest disclosure.** The author of this atlas is the

  author of Harmless Harnesses. Per [`GOVERNANCE.md`](../../GOVERNANCE.md)

  §5, this entry is scored conservatively; a non-author reviewer should

  be requested on any PR labelled `coi-self-curation` that modifies it.

  '
