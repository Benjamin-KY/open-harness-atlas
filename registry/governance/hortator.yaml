sovereignty_notes: 'Hortator-ai (commercial; MIT) ships a Kubernetes operator that lets agents create sub-agents at runtime as Tribune/sub-agent CRDs, each with its own Pod, context window, budget, and security boundary. Model-agnostic 3 because the operator is a control plane that delegates to whatever LLM-using container you ship; provider choice is the workload''s, not the operator''s. Strong governance fit: the per-agent boundary, budget, and explicit CRD-mediated escalation map cleanly to the harness audit-log/FSM component, but it does not enforce output contracts on the agents themselves — alignment ''partial''.'
