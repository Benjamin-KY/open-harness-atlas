tagline: Hugging Face's library for training transformers with RLHF, DPO, GRPO, KTO and online RL — the de-facto OSS alignment stack.
description: 'TRL (Transformer Reinforcement Learning) is Hugging Face''s library

  for post-training and aligning transformer language models. It

  implements the canonical alignment recipes — SFT, reward modeling,

  PPO, DPO, GRPO, KTO, online RL with vLLM — as `Trainer` subclasses

  that compose with HF Transformers, PEFT, and Accelerate. TRL is the

  upstream that most production OSS alignment work (Llama-Factory,

  Axolotl, OpenRLHF, verl) either depends on or directly forks.


  In the atlas: TRL is catalogued under **governance** because it is

  the substrate by which an organisation actually executes the

  Harmless Harnesses §1 policy-router and §3 prompt-composer training

  cycles. The DPO / GRPO trainers in particular are the concrete

  mechanism by which a refusal policy or a structured-output contract

  is baked into model weights, rather than enforced only at inference

  time by a guardrail layer.

  '
