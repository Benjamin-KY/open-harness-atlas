sovereignty_notes: 'Hugging Face is US-incorporated (NYC); TRL itself is Apache-2.0 and

  fully self-hostable. Multi-provider via the HF Transformers

  abstraction (works against any HF-format checkpoint — Llama, Mistral,

  Qwen, Gemma, DeepSeek, Phi, etc.) and against any backend Accelerate

  supports (single-GPU, DDP, FSDP, DeepSpeed, multi-node). Online RL

  trainers integrate with vLLM for self-hosted generation — no

  dependency on Hugging Face Hub at training time beyond initial model

  download. Optional W&B / TensorBoard logging is configurable.

  '
