sovereignty_notes: UNDP (United Nations Development Programme — a UN/institution maintainer) ships iVerify Apps as AGPL-3.0-only Node.js / Nest.js integration apps that wire WordPress, Meedan Check, Detoxify and the Perspective API into a human-in-the-loop fact-checking workflow (publisher + triage). No generative-LLM provider abstraction exists, so model-agnostic 0 — the project is hard-locked to its specific classifier and fact-checking endpoints; the deterministic verification-status FSM (UNSTARTED → IN_PROGRESS → FALSE / MISLEADING / PARTLY_FALSE …) gives a partial `audit_log_fsm` slot, but this is governance for classification AI, not a generative harness.
