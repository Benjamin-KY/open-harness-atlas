sovereignty_notes: 'Polo Club of Data Science (Duen Horng ''Polo'' Chau''s lab at Georgia Tech, with IBM Research co-author Pin-Yu Chen) maintains llm-landscape under MIT — official research code for the NeurIPS 2024 paper ''Navigating the Safety Landscape: Measuring Risks in Finetuning Large Language Models'' that visualises 1D/2D LLM safety landscapes and computes the VISAGE score. Institution-grade reference per §8.3 (named in peer-reviewed paper). Model-agnostic 0 — research artefact wired to specific open-weight models (Llama2-7b-chat) requiring ~27 GB A100 access; no provider abstraction. Curators should consider recategorising from governance/safety-layer to eval/safety-eval since the artefact measures rather than enforces.'
