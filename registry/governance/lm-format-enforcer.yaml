description: |
  LM Format Enforcer is Noam Gat's token-level JSON Schema and regex format enforcement for transformers, vLLM, llama.cpp, and TensorRT-LLM. Works as a prefix_allowed_tokens_fn hook into HuggingFace pipelines without modifying inference loop; supports optional fields and flexible whitespace; integrates with NVIDIA TensorRT-LLM and ExLlamaV2 which outlines does not..

  In the atlas: LM Format Enforcer is a governance-layer entry. Where it lands on the five-component spine (policy router / source authority / prompt composer / output contract / audit-log FSM) is captured in `five_component_coverage` below.
