tagline: 'Decorator-based Python library for defining LLM-powered functions with Pydantic-typed return values and tool calling'
description: |
  magentic is Jack Collins's decorator-based Python library for defining LLM-powered functions with Pydantic-typed return values and tool calling. @prompt and @chatprompt decorators make LLM calls look like native Python functions; @prompt_chain auto-resolves FunctionCall loops; minimal dependency footprint vs instructor's pydantic validation stack or marvin's heavier orchestration layer..

  In the atlas: magentic is a governance-layer entry. Where it lands on the five-component spine (policy router / source authority / prompt composer / output contract / audit-log FSM) is captured in `five_component_coverage` below.
