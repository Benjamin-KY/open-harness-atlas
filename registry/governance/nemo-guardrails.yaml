license: Apache-2.0
primary_language: Python
tagline: Programmable rails between user input, model, and external systems via the Colang DSL.
description: |
  NeMo Guardrails sits between a user, an LLM, and external tools as a
  policy-driven dialogue manager. It uses **Colang**, a small declarative
  DSL, to define flows: input rails (validate / refuse / rephrase),
  output rails (mask PII, fact-check, jailbreak detection), dialogue rails
  (canonical-form intents → flows), retrieval rails (RAG citation
  discipline), and execution rails (tool call mediation). Each rail
  intercepts the message stream at a known point and applies a
  deterministic or model-based check.

  In the atlas: NeMo Guardrails is the most feature-complete OSS
  governance harness in production use today. It implements all five
  invariants partially or natively, but in a programmable-rails idiom
  rather than the five-component spine of the Harmless Harnesses
  reference. Cross-link target for anyone graduating from a single-rail
  setup to a structured spine.
