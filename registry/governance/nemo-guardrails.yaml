sovereignty_notes: |
  NVIDIA-maintained, Apache-2.0, fully self-hostable as a Python package.
  Multi-provider via the `models:` config: OpenAI, Anthropic, Azure
  OpenAI, Cohere, Hugging Face, vLLM, Ollama, and any
  OpenAI-compatible endpoint via `base_url`. No telemetry by default.
  Conservative model-agnostic 4 rather than 5 because Colang flows
  occasionally exhibit provider-specific behaviour around stop-tokens
  and structured-output formatting that requires per-provider tuning.
harness_paradigm_alignment: aligned
