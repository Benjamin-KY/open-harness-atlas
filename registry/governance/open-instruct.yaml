sovereignty_notes: |
  AllenAI is a US-based non-profit research institute (Seattle); the
  codebase is Apache-2.0 OSS and fully self-hostable. Works against
  any Hugging Face-format checkpoint and any backend Accelerate /
  DeepSpeed supports. No required hosted dependency; the recipes
  consume open datasets (Tülu-3, Olmo Mix, etc.) which AllenAI
  publishes alongside the code. Optional W&B / Beaker logging is
  configurable.
