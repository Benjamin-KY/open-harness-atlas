tagline: 'One-line OTel-native LLM observability with GPU monitoring, prompt management, and API key vault'
description: |
  OpenLIT is OpenLIT's one-line OTel-native LLM observability with GPU monitoring, prompt management, and API key vault. Uniquely adds GPU utilisation metrics alongside LLM traces; bundles prompt versioning (Prompt Hub), secrets management, and OpenGround multi-model playground in a single self-hosted stack unavailable in agentops or langfuse..

  In the atlas: OpenLIT is a governance-layer entry. Where it lands on the five-component spine (policy router / source authority / prompt composer / output contract / audit-log FSM) is captured in `five_component_coverage` below.
