  source_authority: none
  prompt_composer: none
  output_contract: none
  audit_log_fsm: none
sovereignty_notes: |
  Traceloop (IL-incorporated company); OSS core is Apache-2.0 and fully self-hostable. Model-agnostic 4 — the substrate is provider-abstracted but with some defaults or shipped configurations that favour a specific tier.
