tagline: Ray-based RLHF / DPO / GRPO / REINFORCE++ framework for scaled multi-node alignment training with vLLM-backed online rollouts.
description: |
  OpenRLHF is an Apache-2.0 RLHF / preference-optimisation framework
  built on Ray, vLLM, and Hugging Face Accelerate. It implements PPO,
  DPO, GRPO, REINFORCE++, KTO, online RL, and VLM training as
  scalable trainers that span single-GPU experiments to multi-node
  clusters. Online RL uses vLLM as the rollout backend so generation
  and learning loops run at production-grade throughput; checkpoints
  are standard Hugging Face format.

  In the atlas: OpenRLHF is the **production-scale alignment
  trainer** point — adjacent to Hugging Face TRL and AllenAI's
  open-instruct in the governance space. Where TRL emphasises
  composable `Trainer` subclasses on a single node and
  open-instruct emphasises recipe reproducibility, OpenRLHF
  emphasises multi-node throughput for organisations that need to
  align frontier-class models against in-house preference data
  without a hosted alignment service.
