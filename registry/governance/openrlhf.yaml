sovereignty_notes: |
  Community-maintained; Apache-2.0 OSS; fully self-hostable. Works
  against any Hugging Face-format checkpoint (Llama, Qwen, Mistral,
  DeepSeek, Gemma, Phi) and any backend Accelerate / Ray supports.
  vLLM is the default rollout backend for online RL but can be
  swapped for any OpenAI-compatible local server. No required hosted
  dependency; optional W&B / TensorBoard logging is configurable.
