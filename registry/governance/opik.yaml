description: |
  Opik (by Comet) is Comet ML's end-to-end LLM observability with tracing, online evaluation rules, guardrails, and agent optimizer. Combines production-scale tracing (40M+ traces/day), built-in LLM-as-judge evaluation with online rules engine, and an Agent Optimizer SDK in one Apache-2.0 package — broader scope than langfuse (evals + guardrails missing) or langkit (Python-only metrics)..

  In the atlas: Opik (by Comet) is a governance-layer entry. Where it lands on the five-component spine (policy router / source authority / prompt composer / output contract / audit-log FSM) is captured in `five_component_coverage` below.
