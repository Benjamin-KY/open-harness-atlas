sovereignty_notes: 'PackmindHub (FR, company-maintained) ships Packmind under Apache-2.0 as a centralised playbook + multi-harness renderer that emits per-tool context files (Copilot, Claude Code, Cursor, AGENTS.md). It is a governance/prompt-composer layer: rules live once, get rendered everywhere, with ownership/approval workflow for edits. Model-agnostic 3 is structural — Packmind does not invoke models itself, so its agnosticism is inherited from whichever harness consumes the generated files.'
