id: presidio
name: Microsoft Presidio
category: governance
subcategory: pii-detection-and-redaction
repo_url: https://github.com/microsoft/presidio
homepage: https://microsoft.github.io/presidio/
license: MIT
primary_language: Python
tagline: Pluggable PII detection and redaction for text and structured data, usable as an LLM rail.
description: |
  Presidio is a Microsoft-maintained framework for detecting,
  classifying, and redacting personally identifiable information (PII)
  in text and structured data. It ships analyzer components (spaCy NER,
  pattern recognizers, custom recognizers), an anonymizer that supports
  redact / mask / replace / hash / encrypt strategies, and dedicated
  modules for image and structured-data PII.

  In the atlas: Presidio is the most production-mature OSS PII rail and
  is widely deployed as the **PII enforcement layer** of larger
  governance harnesses (e.g., as an output-rail step in NeMo Guardrails
  or as a custom validator in Guardrails AI). MIT-licensed and fully
  self-hostable; its recognizer registry is extensible without forking.
