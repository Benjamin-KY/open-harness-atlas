sovereignty_notes: |
  Microsoft-maintained, MIT-licensed, fully self-hostable as Python
  packages (`presidio-analyzer`, `presidio-anonymizer`, plus the image
  and structured modules). No telemetry; runs offline by default.
  Model-agnostic 5 because Presidio is not LLM-dependent — recognizers
  are pattern + NER + optional custom logic — so it sits cleanly in
  front of or behind any model backend without coupling.
