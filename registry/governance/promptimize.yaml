tagline: 'TDD-inspired CLI toolkit defining prompt test cases as code with scoring functions and regression reporting'
description: |
  Promptimize is Preset (Maxime Beauchemin)'s tDD-inspired CLI toolkit defining prompt test cases as code with scoring functions and regression reporting. Brings test-driven development discipline to prompts: define PromptCase objects with Python lambda evaluators, run CLI suites, track regressions. Unlike prompttools (notebook-first) or promptfoo (YAML config), uses pure Python code for test/eval definitions. Dormant since 2023..

  In the atlas: Promptimize is a governance-layer entry. Where it lands on the five-component spine (policy router / source authority / prompt composer / output contract / audit-log FSM) is captured in `five_component_coverage` below.
