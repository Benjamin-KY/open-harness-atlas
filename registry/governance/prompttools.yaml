tagline: 'Jupyter/notebook-native framework for cross-model prompt experiments, evaluation, and vector DB testing'
description: |
  PromptTools is Hegel AI's jupyter/notebook-native framework for cross-model prompt experiments, evaluation, and vector DB testing. Runs experiments across multiple LLM providers and vector DBs in a single notebook call; includes Streamlit playground and latency/quality comparison tables; more experiment-centric than agenta (no versioning) and broader than promptimize (supports non-OpenAI models + VectorDB evals). Low activity ~2024..

  In the atlas: PromptTools is a governance-layer entry. Where it lands on the five-component spine (policy router / source authority / prompt composer / output contract / audit-log FSM) is captured in `five_component_coverage` below.
