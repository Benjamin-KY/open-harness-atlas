sovereignty_notes: 'Responsible AI Labs (commercial company; rail-score-js is their official JS/TS SDK, MIT-licensed) ships a typed client for the hosted RAIL Score API that scores generations across 8 responsibility dimensions, with a configurable policy engine (log/block/regenerate/custom), agent-policy enforcement, prompt-injection detection, session tracking and OTel/Langfuse observability. Model-agnostic 3 — built-in wrappers for OpenAI, Anthropic and Google Generative AI; the SDK is provider-pluggable. SERVICE-DEPENDENCY FLAG: the SDK is free OSS but is a client to a third-party hosted scoring service, so the catalogued artefact''s usefulness depends on the API''s continued free-tier availability — re-confirm before merge.'
