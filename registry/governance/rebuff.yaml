id: rebuff
name: Rebuff
category: governance
subcategory: prompt-injection-detection
repo_url: https://github.com/protectai/rebuff
homepage: https://github.com/protectai/rebuff
license: Apache-2.0
primary_language: Python
tagline: Layered prompt-injection detector — heuristic, embedding, LLM-as-judge, and canary tripwire.
description: |
  Rebuff is a focused OSS prompt-injection detector that runs four
  layers against every user input: (1) **heuristics** — known attack
  patterns and obfuscation signatures; (2) **vector store** — cosine
  similarity against a curated corpus of known injections; (3) **LLM as
  judge** — a small classifier prompt; (4) **canary tokens** — output
  tripwires that detect when the model has followed an injected
  instruction. Each layer can be enabled or disabled independently.

  In the atlas: Rebuff is the cleanest example of a **single-purpose
  governance rail**. It does one thing (prompt-injection detection)
  with explicit defence-in-depth, and exposes a stable API for
  embedding inside any larger harness. Pair with Guardrails AI for
  output contracts and a routing layer for full five-component
  coverage.
