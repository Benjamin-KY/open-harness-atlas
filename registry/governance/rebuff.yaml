sovereignty_notes: |
  Protect AI is a US-incorporated company; Rebuff itself is Apache-2.0
  and self-hostable. The detection layers can run locally; the LLM-as-judge
  layer uses whichever OpenAI-compatible endpoint is configured (so any
  local backend works). The vector store layer supports local Pinecone
  replacements; conservative model-agnostic 3 because the default
  configuration assumes OpenAI for the judge layer and switching to a
  local model requires minor config and re-tuning of the judge prompt.
