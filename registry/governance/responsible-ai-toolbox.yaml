sovereignty_notes: Microsoft Corporation (company-maintained, MIT licence). The toolbox bundles InterpretML, Fairlearn and Error Analysis widgets for tabular/vision/NLP model assessment; the governance surface here is observability-with-eval rather than LLM output-contract enforcement. Model-agnostic 1 — the dashboards plug into whatever framework's model you bring (sklearn/PyTorch/TF) but the project predates LLM-provider routing and offers no provider-swap abstraction.
