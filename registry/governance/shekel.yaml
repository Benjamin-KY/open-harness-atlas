sovereignty_notes: 'arieradle (community / individual) publishes shekel on PyPI under MIT as a budget-control / cost-governance library for AI agents: a `with budget(max_usd=…)` context manager that monkey-patches every major SDK (OpenAI, Anthropic, Gemini, LiteLLM, HuggingFace, Groq, LangChain, LangGraph, CrewAI, OpenAI Agents SDK, MCP, AutoGen, LlamaIndex) and raises BudgetExceededError on breach — plus loop guard, max-velocity throttling, per-agent caps and a `shekel run` CLI for code-free enforcement. Model-agnostic 5: provider abstraction is effectively complete because shekel sits beneath them all. Alignment is `aligned` — the pitch is explicitly governance-first (cost contract + loop guardrails) with a real hard-cap output contract and per-call audit/state tracking.'
