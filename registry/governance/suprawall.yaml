sovereignty_notes: Wiser Automation (commercial vendor at supra-wall.com, also on AWS Marketplace); Apache-2.0 deterministic firewall for AI agents — `LocalPolicyEngine` ships with safe defaults that block destructive shell/network actions before the tool runs, with framework-auto-detect `wrap_with_firewall()` for LangChain/LangGraph/AutoGen/CrewAI/OpenAI Agents SDK/Anthropic. Every blocked action becomes a signed, SHA-256-hashed shareable trace with PII auto-redacted (`e.share_url()`/`e.save_local()`). Model-agnostic 3 — policy engine is provider-neutral. Pitches itself as governance-first and covers policy-router + output-contract + audit-log surfaces, so alignment raised to `aligned`.
