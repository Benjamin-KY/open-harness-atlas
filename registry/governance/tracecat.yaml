sovereignty_notes: |
  Added 2026-06-15 via the v0.4.0 fresh-discovery sweep (8 gh-search topic queries, OSI-license filter, anti-laziness cross-reference against the existing 838 yaml files for both simple-id and owner-disambiguator collisions).
  AGPL-3.0; self-hostable Docker / Kubernetes stack. AGPL carries the standard network-use copyleft trigger, which is intentional — operators forking and offering modified Tracecat as a service must publish their changes. Multi-provider on the LLM side; multi-cloud on the deployment side. The hosted variant is optional and separate.
