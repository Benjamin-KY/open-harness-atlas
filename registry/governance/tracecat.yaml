tagline: "Open-source security automation platform for human teams and AI agents — workflow engine, case management, and policy enforcement on the same surface."
description: |
  Tracecat is a security-automation platform — workflow engine, case-management surface, and policy-enforcement layer — designed from the start to be operated by both human SOC analysts and AI agents on the same primitives. Workflows are versioned, role-scoped, and reviewable; agent actions get the same audit trail as human actions.

  In the atlas: Tracecat is catalogued under governance / security-automation as the open-source counterpart to SOAR products like Tines and Torq. Inclusion in the harness atlas is because the agent-friendly workflow surface is exactly the §5 audit-log-FSM substrate that operator-grade agent deployments need.
