sovereignty_notes: |
  Added 2026-06-14 via the second recency-biased discovery sweep (non-agent categories: routing / redteam / eval).
  Apache-2.0; CLI tool that runs locally against the operator's source tree. No code leaves the host; results are local JSON / SARIF. Provider-agnostic — analyses the agent code, not the model.

