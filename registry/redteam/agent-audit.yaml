license: MIT
primary_language: Python

tagline: "Static security scanner for LLM agents — prompt injection, MCP config auditing, taint analysis."

description: |
  Agent-audit is a static-analysis tool for LLM-agent codebases. Detects prompt-injection sinks via taint analysis, audits MCP server configurations for unsafe patterns, flags missing input validation. 51 rules out of the box.

  In the atlas: novel — static-analysis-for-agents niche. Complements runtime defences (`pipelock`, `adrian`) by catching issues before deployment. Closest peer is `semgrep` rules for LLM/agent patterns.

