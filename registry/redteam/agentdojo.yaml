tagline: Dynamic environment to evaluate prompt-injection attacks and defences against tool-using LLM agents.
description: 'AgentDojo is ETH Zürich SPY Lab''s MIT-licensed dynamic environment

  for evaluating attacks and defences against tool-using LLM agents.

  It defines a benchmark of agent tasks across realistic domains

  (banking, travel-booking, Slack, Workspace, etc.), a set of

  prompt-injection attacks (direct, indirect via tool outputs, and

  combined), and metrics for both **utility under attack** and

  **attack success rate** — separating "did the agent still do its

  job?" from "did the attack land?".


  In the atlas: AgentDojo is the canonical **agent-security benchmark**.

  Where garak / PyRIT probe model-tier behaviour, AgentDojo probes

  the agentic surface (tool-calling under adversarial input) — a

  necessary complement when the harness exposes tools.

  '
