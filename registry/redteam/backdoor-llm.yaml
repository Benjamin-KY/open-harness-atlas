tagline: 'First comprehensive benchmark for backdoor attacks on LLMs: data poisoning, weight poisoning, hidden-state steering, CoT attacks, and 7 defenses'
description: |
  BackdoorLLM is Yige Li et al. (NeurIPS 2025 paper)'s first comprehensive benchmark for backdoor attacks on LLMs: data poisoning, weight poisoning, hidden-state steering, CoT attacks, and 7 defenses. Winner of SafetyBench First Prize (CAIS 2025); covers 6 LLM architectures including 70B; unified defense evaluation suite; actively extended to agents/VLMs..

  In the atlas: BackdoorLLM is a red-team / adversarial-evaluation entry. Red-team harnesses surface the failure modes that downstream governance and routing layers need to guard against.
