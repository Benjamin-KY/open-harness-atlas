tagline: "Reference code for 'Defeating Prompt Injections by Design' (Google Research)."

description: |
  Camel is the reference implementation for the Google Research paper 'Defeating Prompt Injections by Design'. Demonstrates an architectural defence where the agent executes in a typed action space that is provably immune to text-only prompt injection.

  In the atlas: the design-by-construction counterpart to the runtime defences in `pipelock` and `agent-security-scanner-mcp`. Important reference for the `audit-log-fsm-escalation` and `sovereignty-preserving-routing` patterns.

