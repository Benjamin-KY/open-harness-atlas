tagline: LLM vulnerability scanner — nmap for language models.
description: 'garak is NVIDIA''s Apache-2.0 LLM vulnerability scanner: an

  `nmap`-style probe-and-detector framework that targets a model

  with a battery of pre-defined probes (prompt injection, jailbreak,

  hallucination, toxicity, data leakage, encoding-based attacks,

  malware-generation, sensitive-info disclosure, and more) and

  reports findings against pluggable detectors. It includes 100+

  probes covering known attack families and integrates with

  Hugging Face, OpenAI, Replicate, Cohere, Anthropic, Ollama, and

  any OpenAI-compatible local backend.


  In the atlas: garak is the canonical **LLM vulnerability scanner**

  — the off-the-shelf scanner you point at a target to get a

  baseline finding inventory before doing targeted PyRIT work. The

  two compose: garak gives breadth, PyRIT gives depth.

  '
