sovereignty_notes: |
  French-incorporated company; OSS library (`giskard-oss`) is
  Apache-2.0 and runs entirely locally; a separate commercial Hub
  product offers enterprise features but is not required.
  Multi-backend for target models (OpenAI, Anthropic, Hugging Face,
  local). Conservative model-agnostic 4 — some probes use LLM-as-judge
  scoring, sensitivity to judge model.
