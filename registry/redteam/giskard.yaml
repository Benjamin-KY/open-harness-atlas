id: giskard
name: Giskard
category: redteam
subcategory: llm-vulnerability-scanner
repo_url: https://github.com/Giskard-AI/giskard-oss
homepage: https://www.giskard.ai/
license: Apache-2.0
primary_language: Python
tagline: Open-source evaluation and testing for ML and LLM models — automated scan for 40+ vulnerability classes.
description: |
  Giskard is an Apache-2.0 evaluation and testing framework for ML
  and LLM applications. Its `scan` function probes a target model
  with 40+ adversarial probes covering prompt injection, character
  injection, sycophancy, hallucination, harmful-content generation,
  sensitive-info disclosure, stereotype / bias, and output-format
  robustness, producing an HTML report. Beyond LLMs, Giskard also
  covers classical tabular ML — making it a good fit for teams
  whose surface area includes both.

  In the atlas: Giskard is the **report-generating scanner** sibling
  of garak. Where garak emphasises CLI-driven probe + detector
  reporting, Giskard emphasises an interactive HTML report and
  integration with classical-ML pipelines.
