origin_country: null

model_agnostic_score: 4

sovereignty_notes: |
  Added 2026-06-14 via the second recency-biased discovery sweep (non-agent categories: routing / redteam / eval).
  MIT licence; runs locally. The 'attacker' LLM and 'judge' LLM are both operator-selected — can be the same model, different providers, or local-only (Llama, etc.).

