id: llmmap
name: "Llmmap"

category: redteam
subcategory: prompt-injection-testing

repo_url: https://github.com/Hellsender01/LLMMap
license: MIT
primary_language: Python

tagline: "Automated prompt-injection testing framework with dual-LLM architecture."

description: |
  LLMMap is an automated prompt-injection testing framework that uses a dual-LLM architecture: one LLM generates candidate injections, a separate LLM judges responses for compromise. Inspired by the nmap workflow for traditional vuln scanning.

  In the atlas: peer to `garak`, `promptfoo` on the CI-style scanning side. Dual-LLM judge architecture is the interesting bit — same pattern as `aigis` and modern eval frameworks.

maturity: beta

