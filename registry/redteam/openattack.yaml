tagline: 'Open-source Python toolkit for textual adversarial attacks: sentence/word/character perturbations, multilingual (EN+ZH), Hugging Face compatible'
description: |
  OpenAttack is THUNLP (Tsinghua NLP Lab)'s open-source Python toolkit for textual adversarial attacks: sentence/word/character perturbations, multilingual (EN+ZH), Hugging Face compatible. All attack types in one framework (gradient/score/decision/blind); parallel attack execution; 20+ built-in attack models including PWWS, TextFooler, BERT-Attack, VIPER..

  In the atlas: OpenAttack is a red-team / adversarial-evaluation entry. Red-team harnesses surface the failure modes that downstream governance and routing layers need to guard against.
