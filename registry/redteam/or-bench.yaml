  name: OR-Bench paper authors (UC Berkeley)
origin_country: US
model_agnostic_score: 5
sovereignty_notes: |
  Academic-paper-backed; Apache-2.0 OSS; runs entirely offline
  against any chat-completion endpoint. The grader is an automated
  LLM-as-a-judge configurable to use any provider. Multi-provider
  via standard OpenAI-compatible HTTP — works against local vLLM /
  Ollama / TGI as well as hosted providers. No hosted-service
  dependency.
