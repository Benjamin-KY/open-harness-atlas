sovereignty_notes: luckyPipewrench / Pipelab (company; pipelab.org) ships the catalogued Pipelock OSS core under Apache-2.0 (a separate `enterprise/` tree carries the non-OSI ELv2; only the Apache-2.0 core is catalogued per §1.1). Model-agnostic 3 is correct because Pipelock sits at the network boundary and inspects the actual content crossing mediated transports rather than calling models. Policy-router `partial` (62 credential and 29 injection patterns with 6-pass normalisation enforce content-aware allow / deny before egress) and audit-log `partial` (mediator-signed action receipts from outside the agent process give third-party-verifiable evidence). OSSF Scorecard + Best Practices Silver + SLSA + SBOM attestations indicate strong supply-chain hygiene.
