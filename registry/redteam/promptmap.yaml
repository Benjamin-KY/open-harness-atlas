sovereignty_notes: 'Solo-maintained; GPL-3.0 (strong copyleft — note that integrating

  promptmap into a closed-source pipeline requires legal review,

  whereas treating it as a stand-alone CLI scanner is unambiguously

  fine). Runs entirely locally; supports any OpenAI-compatible

  endpoint as the target. Conservative model-agnostic 4 — the

  probe-generation step itself currently assumes an OpenAI-format

  model.

  '
