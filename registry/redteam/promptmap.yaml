tagline: Vulnerability scanner for custom LLM applications — targeted prompt-injection probing.
description: 'promptmap (promptmap2) is a GPL-3.0-licensed vulnerability scanner

  focused specifically on **prompt-injection testing of custom LLM

  applications**. It takes the application''s system prompt as input,

  generates application-specific injection probes, and reports which

  succeed. Designed to be lightweight and pointed at any

  OpenAI-compatible endpoint or custom HTTP target.


  In the atlas: promptmap is the **single-issue scanner** counterpart

  to garak''s broad battery — useful when the question is narrowly

  "is this application''s system prompt resilient to injection?"

  rather than "what is the general risk surface of this model?".

  '
