sovereignty_notes: |
  Microsoft (US-incorporated company); MIT-licensed; runs entirely
  locally; supports any HTTP-reachable target, including local
  OpenAI-compatible endpoints (vLLM, Ollama, llama.cpp) and arbitrary
  custom-prompt callbacks. Model-agnostic 5 — `PromptTarget`
  abstracts the backend uniformly across providers.
