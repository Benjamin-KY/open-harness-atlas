tagline: Microsoft AI Red Team's framework for automated risk identification across generative AI systems.
description: |
  PyRIT (Python Risk Identification Tool) is the Microsoft AI Red
  Team's MIT-licensed framework for automating risk identification
  across generative AI systems. It defines a composable abstraction
  of `Orchestrators`, `Converters`, `Scorers`, `Datasets`, and
  `Targets`, allowing red-teamers to chain prompts through
  transformation pipelines, send them to arbitrary targets, and
  score the responses against safety / robustness criteria.
  Multi-turn attack orchestrators (Crescendo, PAIR, TAP, Skeleton
  Key) ship out of the box.

  In the atlas: PyRIT is the canonical **AI red-team automation
  harness** from a major vendor's red team. It composes cleanly above
  a routing layer (probe any target the routing layer can reach) and
  feeds naturally into governance-layer regression suites.
