sovereignty_notes: 'Maintained by OpenSafetyLab at Shanghai AI Lab; Apache-2.0 OSS;

  runs entirely offline against any chat-completion endpoint. The

  MD-Judge safety classifier is published as standard Hugging Face

  weights and can be served locally via vLLM / TGI. Multi-provider

  via OpenAI-compatible HTTP — works against local backends as well

  as hosted providers. No hosted-service dependency.

  '
