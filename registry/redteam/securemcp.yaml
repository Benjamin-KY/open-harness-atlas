sovereignty_notes: 'makalin (community / individual, Türkiye — long-running Turkish OSS author) ships SecureMCP under MIT as a Go CLI + Docker image for security auditing Model Context Protocol servers: OAuth/JWT scanner, prompt-injection probe (multiple payload positions, system-prompt override and role-confusion detection), TLS/auth/HSTS/CSP header validation, HTML+JSON reports with severity scoring. Model-agnostic 2 — the scanner targets HTTP endpoints rather than LLM providers, with prompt-injection tests assuming an OpenAI-compatible chat surface; redteam scope is well-suited to §8 even though the MAS rubric is a poor fit for a pure auditing tool.'
