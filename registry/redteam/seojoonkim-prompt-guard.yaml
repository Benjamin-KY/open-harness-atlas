tagline: "Multi-language prompt-injection defence with severity scoring."

description: |
  Prompt-guard (seojoonkim) is a runtime prompt-injection defence for AI agents. Multi-language detection, severity scoring, and a small declarative ruleset for tenant-specific policy.

  In the atlas: peer to `llm-guard`, `nemo-guardrails`, `pipelock`. Differentiator is the multi-language emphasis (non-English injection payloads) and severity-scoring primitive that is easy to wire into an escalation policy.

