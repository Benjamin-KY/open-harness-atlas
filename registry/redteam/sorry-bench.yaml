origin_country: US
model_agnostic_score: 5
sovereignty_notes: 'Academic-paper-backed; MIT-licensed; runs entirely offline

  against any chat-completion endpoint. The grader is an automated

  classifier (LLM-as-a-judge configurable to use any provider, or a

  fine-tuned local model published alongside the paper).

  Multi-provider via standard OpenAI-compatible HTTP — works against

  local vLLM / Ollama / TGI as well as hosted providers.

  '
