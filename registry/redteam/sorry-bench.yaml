tagline: ICLR 2025 benchmark for systematically evaluating LLM safety refusal across a 44-class fine-grained unsafe-instruction taxonomy.
description: 'SORRY-Bench is the MIT-licensed benchmark and grader from the

  ICLR 2025 paper "SORRY-Bench: Systematically Evaluating Large

  Language Model Safety Refusal Behaviors". It supplies a 440-prompt

  evaluation set covering a 44-class fine-grained taxonomy of

  potentially-unsafe instructions, plus 21 linguistic mutators

  (paraphrase, encoding, role-play) and an automated grader. The

  benchmark is designed to address class imbalance and surface

  artifacts in earlier safety datasets like AdvBench by carefully

  balancing topics, mutators, and linguistic styles.


  In the atlas: SORRY-Bench is the **fine-grained refusal

  benchmark** point in the redteam space — adjacent to StrongREJECT

  (which corrects scoring artifacts in earlier jailbreak datasets)

  and SALAD-BENCH (which provides a different safety taxonomy).

  Together they form the modern 2024-2025 refusal-evaluation

  reference set for any organisation calibrating a safety policy.

  '
