tagline: Berkeley's improved jailbreak benchmark and automated grader — patches the well-known scoring artifacts in earlier harmful-behavior datasets like AdvBench.
description: 'StrongREJECT is the Berkeley benchmark and grader for evaluating

  the *strength* of jailbreak attacks against aligned LLMs.

  Earlier benchmarks (AdvBench, HarmBench) suffer from grader

  artifacts where superficial refusals or topic-deflection score

  as "successful jailbreak" even when the actual model output

  contains no harmful content. StrongREJECT pairs a curated

  forbidden-prompts dataset with an LLM-based grader that scores

  on the specificity and convincingness of harmful content, not

  on string-level cues. Subsequent jailbreak research routinely

  re-runs against StrongREJECT to validate against the legacy

  benchmark inflation.


  In the atlas: strong-reject is the canonical

  **jailbreak benchmark + automated grader** in the red-team

  space, adjacent to harmbench, agentharm, and the broader

  attack-evaluation literature. Catalogued under redteam because

  the deliverable is an attack-evaluation harness; operators use

  it to measure refusal robustness rather than to train

  alignment.

  '
