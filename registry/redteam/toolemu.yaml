id: toolemu
name: ToolEmu
category: redteam
subcategory: agent-security-benchmark
repo_url: https://github.com/ryoungj/ToolEmu
homepage: https://toolemu.com/
license: Apache-2.0
primary_language: Python
tagline: LM-emulated sandbox for identifying tool-use risks in LLM agents at scale.
description: |
  ToolEmu (ICLR 2024 spotlight) is an Apache-2.0 framework that uses
  one language model to **emulate** tool execution for another
  language model under test, allowing safety-evaluation of
  tool-using agents without actually executing risky side effects
  (rm-rf-style commands, financial transactions, sending real
  emails). It ships a curated test suite of 36 high-stakes
  tool-use scenarios, an emulator prompt, and safety / helpfulness
  evaluators.

  In the atlas: ToolEmu is the canonical **safe-by-construction
  agent-evaluation environment**. It is the answer to the practical
  problem "how do I evaluate an autonomous agent on dangerous
  scenarios without giving it dangerous tools?" — strong fit for
  pre-deployment safety review under a Harmless Harnesses
  audit-log invariant.
maturity: beta
