sovereignty_notes: |
  Academic research project (NYU lead author); Apache-2.0; runs
  entirely locally. Both the agent-under-test and the emulator LM
  are pluggable, but the emulator quality matters — small / weak
  local LMs may emulate badly. Conservative model-agnostic 4 — the
  framework is provider-agnostic but the emulator role is sensitive
  to model capability.
