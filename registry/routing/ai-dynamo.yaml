tagline: "NVIDIA's high-performance inference framework for distributed LLM serving — Rust core, disaggregated prefill / decode, KV-cache routing."
description: |
  AI Dynamo is NVIDIA's open-source inference framework for high-throughput distributed LLM serving. Written in Rust, introduces disaggregated prefill / decode stages, KV-cache-aware request routing across replicas, and dynamic GPU resource allocation. Designed for the multi-node large-model serving regime where vLLM's single-node optimisations leave performance on the table.

  In the atlas: AI Dynamo is catalogued under routing / inference-engine alongside vLLM, SGLang, TensorRT-LLM, and TGI. Differentiator is the explicit cluster-scale design — Dynamo is what NVIDIA built for the case where the operator wants to serve a frontier-scale model across many GPUs without paying the latency cost of naive tensor-parallelism.
