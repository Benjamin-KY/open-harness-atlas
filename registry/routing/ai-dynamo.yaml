sovereignty_notes: |
  Added 2026-06-15 via the v0.4.0 fresh-discovery sweep (8 gh-search topic queries, OSI-license filter, anti-laziness cross-reference against the existing 838 yaml files for both simple-id and owner-disambiguator collisions).
  Apache-2.0; self-hosted Rust binary. Runs on operator's GPUs (typically NVIDIA, hence the maintainer's optimisation focus). OpenAI-compatible HTTP surface keeps client code portable. No call-home in normal operation; no NVIDIA-cloud dependency in the OSS deliverable.
