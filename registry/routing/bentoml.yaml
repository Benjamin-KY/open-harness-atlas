  type: company
  name: BentoML / bentoml.com
origin_country: US
model_agnostic_score: 5
sovereignty_notes: 'BentoML Inc. is US-incorporated; the OSS core is Apache-2.0 and

  fully self-hostable on any container platform. Multi-provider on

  both the model side (any vLLM-supported checkpoint, plus

  HF Transformers, llama.cpp, ONNX, scikit-learn) and the deployment

  side (Docker, Kubernetes, AWS, GCP, Azure, on-prem). The optional

  BentoCloud hosted control-plane is opt-in — running entirely

  on-prem requires no Bento-side dependency. No call-home by default.

  '
