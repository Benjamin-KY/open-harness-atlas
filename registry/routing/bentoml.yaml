tagline: Build, ship, and scale AI model-serving APIs — Python-first, framework-agnostic, with first-class LLM inference primitives.
description: 'BentoML is a model-serving framework that packages ML and LLM

  workloads as Python "Service" classes, builds them into portable

  "Bentos" (versioned artifacts containing the model, dependencies,

  and runtime), and serves them as HTTP / gRPC / streaming APIs. The

  LLM track adds first-class support for vLLM and TGI-style

  continuous batching, OpenAI-compatible endpoints, and adaptive

  batching across heterogeneous request shapes. The companion

  OpenLLM project builds on Bento to ship pre-packaged LLM

  inference runtimes for popular open models.


  In the atlas: BentoML is catalogued under **routing** as a

  framework-agnostic model-serving substrate. Unlike vLLM /

  TensorRT-LLM (single-runtime engines) or LiteLLM (provider-router

  proxy), Bento is the application-server layer that operators use

  to ship the model behind any of those engines as a stable,

  observable API surface with its own batching, auth, and metrics.

  '
maturity: ga
