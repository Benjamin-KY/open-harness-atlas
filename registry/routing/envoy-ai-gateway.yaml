sovereignty_notes: 'CNCF Sandbox project; Apache-2.0; vendor-neutral governance under

  the Envoy Project. Self-hostable on any Kubernetes cluster.

  Multi-provider via schema translation (OpenAI / Anthropic / AWS

  Bedrock / Google Vertex); local-backend support depends on the

  backend exposing an OpenAI-compatible endpoint inside the cluster.

  Conservative model-agnostic 4 — production posture is k8s-only,

  outside that footprint other gateways are simpler.

  '
