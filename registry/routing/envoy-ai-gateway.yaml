tagline: CNCF-grade AI gateway built on Envoy — k8s-native traffic management for LLM workloads.
description: 'Envoy AI Gateway is a CNCF-Sandbox project that extends Envoy Proxy

  (the cloud-native edge proxy) with LLM-aware features: provider

  authentication, token-based rate limiting, request /response

  translation across OpenAI / Anthropic / AWS Bedrock / Google

  Vertex schemas, request retries on upstream errors, and integration

  with the Envoy Gateway Kubernetes operator.


  In the atlas: Envoy AI Gateway is the **CNCF / Kubernetes-native**

  routing harness. It is the right choice when the deployment already

  runs Envoy / Istio / Gateway API and wants the LLM-routing layer to

  inherit the same operability primitives (mTLS, observability,

  rate-limit infrastructure) rather than introducing a separate proxy.

  '
