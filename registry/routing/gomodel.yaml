sovereignty_notes: 'ENTERPILOT (company, enterpilot.io) ships GoModel under MIT as a unified OpenAI-compatible Go gateway with Docker quick-start and a dashboard for observability, token/cost tracking, and guardrails. Model-agnostic 4 is correct: provider is environment-variable config, `/v1/chat/completions`, `/v1/responses`, embeddings, files, batches and passthrough are routed across many commercial backends plus first-class Ollama and vLLM via `OLLAMA_BASE_URL` / `VLLM_BASE_URL`. The README explicitly cautions against passing keys via `-e` in production — good operational signal.'
