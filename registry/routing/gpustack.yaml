  name: GPUStack

origin_country: CN

model_agnostic_score: 5

sovereignty_notes: |
  Added 2026-06-14 via the awesome-list discovery sweep (GraphQL-batched parser; >= 2-list endorsement).
  Apache-2.0; self-hosted control plane. Manages the operator's own GPUs (on-prem, cloud VMs, or a mixed fleet). The exposed API is OpenAI-compatible so any client can swap to a self-hosted endpoint without code changes.

harness_paradigm_alignment: aligned

deployment_posture: local-first

