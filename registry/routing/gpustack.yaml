license: Apache-2.0
primary_language: Python

tagline: "Open-source GPU cluster manager that orchestrates inference engines (vLLM, llama.cpp, MLX)."

description: |
  GPUStack is an open-source GPU cluster manager and model gateway. Discovers available accelerators across a heterogeneous fleet (NVIDIA, AMD, Apple Silicon), schedules model loads, and exposes a unified OpenAI-compatible endpoint.

  In the atlas: the missing cluster-orchestration layer below the gateway entries (`litellm`, `portkey-gateway`, `smg`). Peer to `kubernetes` add-ons like KServe, but lighter-weight and ML-native.

