sovereignty_notes: 'US-incorporated company; OSS proxy + dashboard are Apache-2.0 and

  fully self-hostable (Docker + docker-compose); the hosted

  helicone.ai product is a separate paid offering. Multi-provider

  via the proxy URL pattern. Conservative model-agnostic 4 because

  some advanced features (prompt management, experiments) integrate

  more deeply with OpenAI-format calls than with other providers.

  '
