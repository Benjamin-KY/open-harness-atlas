tagline: OSS proxy that adds observability, caching, prompt management, and routing across LLM providers.
description: 'Helicone is an Apache-2.0 LLM gateway / proxy with built-in

  observability (cost, latency, error tracking), prompt management,

  caching, and rate limiting. Applications point at the Helicone

  proxy URL and Helicone forwards to the underlying provider while

  recording the trace. It supports OpenAI, Anthropic, Google, Cohere,

  TogetherAI, Anyscale, and any OpenAI-compatible endpoint.


  In the atlas: Helicone is the **observability-first** routing

  alternative. Where LiteLLM emphasises provider breadth and Portkey

  emphasises production routing, Helicone emphasises the audit-trail

  side — useful as the substrate under a Harmless Harnesses

  audit-log invariant.

  '
