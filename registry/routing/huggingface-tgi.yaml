model_agnostic_score: 4
sovereignty_notes: 'Hugging Face is US-incorporated (NYC); TGI is Apache-2.0 OSS

  and fully self-hostable on any CUDA-capable host (Docker / k8s).

  Supports any Hugging Face Transformers-format checkpoint plus

  AWQ / GPTQ / Marlin quantised variants. No call-home / telemetry

  by default. `model_agnostic_score` is 4 (rather than 5) because

  the runtime is CUDA-only for high-throughput paged-attention —

  CPU-only and AMD ROCm paths exist but are second-class.

  notes_for_maintainers: TGI is currently `archived: true` on

  GitHub as of mid-2025 — re-review when HF clarifies the

  successor project''s identity.

  '
