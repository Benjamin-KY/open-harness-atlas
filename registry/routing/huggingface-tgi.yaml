tagline: Production-grade LLM-serving runtime in Rust + Python — the inference engine behind Hugging Face's Inference Endpoints, with continuous batching, paged attention, and quantisation.
description: 'Text Generation Inference (TGI) is Hugging Face''s production

  inference runtime for large language models: a Rust HTTP / gRPC

  server with a Python frontend that does continuous batching,

  paged attention (via Flash Attention), tensor-parallel sharding,

  speculative decoding, and quantisation (BitsAndBytes, GPTQ,

  AWQ, Marlin). It powers Hugging Face''s hosted Inference

  Endpoints product and is the engine behind much of the HF

  ecosystem''s "deploy this model" UX. TGI ships

  OpenAI-compatible endpoints, an Open Inference Protocol API,

  and Prometheus / OpenTelemetry observability.


  In the atlas: TGI is the Hugging Face counterpart to vLLM and

  NVIDIA TensorRT-LLM in the **inference-runtime** subcategory.

  Operators choose it when their workflow centres on Hugging Face

  Hub conventions (model formats, safetensors, transformers

  configs) or when they want to mirror the Inference Endpoints

  behaviour on-prem. NOTE — the project is currently `archived`

  on GitHub as Hugging Face transitions to `text-generation-router`

  / Inference Endpoints v2; existing deployments remain

  serviceable but new feature work has moved upstream.

  '
maturity: ga
