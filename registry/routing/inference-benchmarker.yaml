  name: Hugging Face

origin_country: US

model_agnostic_score: 5

sovereignty_notes: |
  Added 2026-06-14 via the second recency-biased discovery sweep (non-agent categories: routing / redteam / eval).
  Apache-2.0. Benchmarking tool is fully local; the SUT (server under test) is whatever the operator chooses. Useful evidence-tool when a sovereignty migration needs to be justified ('here are the numbers showing vLLM on-prem matches the managed provider').

