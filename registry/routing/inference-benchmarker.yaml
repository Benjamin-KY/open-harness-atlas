tagline: "Hugging Face inference server benchmarking tool — measure throughput across vLLM / TGI / providers."

description: |
  Hugging Face's inference-benchmarker measures throughput, latency percentiles, and time-to-first-token across OpenAI-compatible inference servers. Built to compare vLLM, TGI, sglang, hosted providers under identical load.

  In the atlas: the missing benchmarking peer to all the routing entries. Use to validate the model-agnostic claim of any stack — same prompts, different backends, head-to-head numbers.

