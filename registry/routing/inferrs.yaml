id: inferrs
name: "Inferrs"

category: routing
subcategory: inference-server

repo_url: https://github.com/ericcurtin/inferrs
license: Apache-2.0
primary_language: Rust

tagline: "TurboQuant inference server."

description: |
  Inferrs is an inference server using TurboQuant quantisation for fast on-device or single-GPU serving. Focuses on small-footprint deployment of quantised models with OpenAI-compatible endpoints.

  In the atlas: a lighter-weight alternative to `vllm` / `tgi` when serving a small number of quantised models on modest hardware.

