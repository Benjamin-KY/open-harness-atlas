sovereignty_notes: 'US-incorporated company; OSS core is MIT-licensed and fully

  self-hostable as a Python package or via the official Docker image.

  Supports any OpenAI-compatible local backend (Ollama, vLLM,

  llama.cpp, text-generation-inference) as a first-class provider —

  meaning the swap target can be a fully local model with no outbound

  API call. The hosted dashboard is optional and separable from the

  proxy. Model-agnostic 5 — provider is a config string and the same

  code path runs against every supported backend.

  '
