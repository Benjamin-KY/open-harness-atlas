license: MIT
primary_language: Python
tagline: Unified SDK and proxy that normalises 100+ LLM APIs into the OpenAI format.
description: 'LiteLLM is a unified Python SDK and standalone proxy server that

  normalises calls to most major LLM providers (OpenAI, Anthropic,

  Google, Cohere, Hugging Face, Bedrock, Vertex, Groq, Mistral,

  local Ollama / vLLM / llama.cpp, and many others) into a single

  OpenAI-compatible interface. It also provides token-budget tracking,

  retry / fallback policies, cost accounting, and request / response

  logging primitives.


  In the atlas: LiteLLM is the **canonical routing harness**. It does

  not constrain model output (no governance), but it makes the model

  tier itself swappable, which is the necessary precondition for every

  other harness category to be sovereign-by-construction. In the

  Fable / Mythos worked example, a LiteLLM-fronted deployment swaps

  the `model:` config string and the agent stack keeps serving.

  '
