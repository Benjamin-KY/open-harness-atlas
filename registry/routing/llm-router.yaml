sovereignty_notes: 'radlab-dev-group ships LLM Router as Apache-2.0 with hosted positioning at llm-router.cloud and a Polish NASK-PIB/Sojka guardrail integration; treated as a company-maintained project. Model-agnostic 4: a single OpenAI-compatible entry point fronts OpenAI, Anthropic, Ollama, vLLM and LM Studio backends with local-first deployment. Plugin layer adds PII masking, semantic routing, and RAG hooks — places it adjacent to governance but the catalogued artefact is the gateway core.'
