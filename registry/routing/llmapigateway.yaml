sovereignty_notes: fabiojbg is a single community maintainer (GitHub User owner); LLMApiGateway is an MIT-licensed personal OpenAI-compatible LLM gateway with fault-tolerant fallback chains, model rotation, custom-parameter injection (reasoning_effort/service_tier/etc.), and explicit integrations for Cline, RooCode, OpenCode, and GitHub Copilot. Model-agnostic 4 — exposes the OpenAI-compat /v1 surface and routes to any OpenAI-compatible upstream provider configured via providers.json, with OpenRouter provider ordering as a first-class feature.
