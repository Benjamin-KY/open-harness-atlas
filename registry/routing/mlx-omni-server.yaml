sovereignty_notes: |
  Added 2026-06-14 via the second recency-biased discovery sweep (non-agent categories: routing / redteam / eval).
  Apple Silicon only. MIT licence; self-hosted; no telemetry. Inference stays on-device; the server only speaks to its own MLX runtime. Provider-portable because client code targets the standard OpenAI shape.

