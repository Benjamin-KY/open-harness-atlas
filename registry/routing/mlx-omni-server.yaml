tagline: "Apple-MLX local inference server exposing an OpenAI-compatible API across modalities."

description: |
  MLX Omni Server is a local inference server built on Apple's MLX framework. Supports text, image, and audio models, with OpenAI-compatible REST endpoints (chat, embeddings, images, audio).

  In the atlas: complements `omlx` (raw-throughput LLM server) and `swiftlm` (Swift-native) as another local-only MLX option. Useful when a project wants the same OpenAI-shape endpoint on an Apple machine for development that production hits in the cloud.

