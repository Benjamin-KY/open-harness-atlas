license: MIT
primary_language: TypeScript
tagline: Production-grade AI gateway — load balancing, fallbacks, retries, caching, and observability across 250+ models.
description: |
  Portkey AI Gateway is a Node.js / TypeScript open-source gateway that
  fronts 250+ LLM providers with a single OpenAI-compatible interface.
  It adds first-class load balancing, conditional routing, automatic
  fallbacks, retries with exponential backoff, semantic caching, and
  request / response logging — designed to run as a production
  edge service.

  In the atlas: Portkey AI Gateway is the canonical example of a
  **production AI gateway**. Compared with LiteLLM (Python proxy) and
  aisuite (Python SDK), Portkey targets the edge-service tier and
  composes well in front of Python apps that themselves use a thinner
  routing layer.
