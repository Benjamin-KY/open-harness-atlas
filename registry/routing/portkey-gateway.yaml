sovereignty_notes: |
  US-incorporated company; OSS gateway is MIT-licensed, fully
  self-hostable, and ships an official Docker image. Hosted dashboard
  is a separate optional paid product — the gateway runs entirely
  standalone. Supports any OpenAI-compatible local backend. Model-agnostic 5
  — a config change reroutes traffic between providers / models /
  local backends transparently to the calling application.
