sovereignty_notes: Meepolabs (small commercial outfit; MIT) maintains a single-binary Rust router that proxies OpenAI chat-completions and Anthropic Messages requests across openai-compat hosts, native Anthropic, AWS Bedrock (SigV4), and openai-responses. Model-agnostic 4 because the openai-compat egress is a generic plugin surface (vLLM, llama.cpp, NIM, Groq, DeepSeek all named in README) and local options are first-class. Strong on the routing axis (policy router, retry/circuit breaker, RPM bucket); thinner on output-contract enforcement, so alignment stays 'partial'.
