sovereignty_notes: |
  LMSYS Org (academic / Berkeley), Apache-2.0, fully self-hostable.
  Routers themselves are trained classifiers that run locally; the
  backend models are pluggable via LiteLLM or direct adapters, so any
  combination of local / commercial backends can be the strong / weak
  pair. Model-agnostic 5 — provider on both tiers is a config string.
