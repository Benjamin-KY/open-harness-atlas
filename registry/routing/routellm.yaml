tagline: Open framework for serving and evaluating LLM routers that direct queries to strong or weak models based on predicted quality.
description: |
  RouteLLM is an Apache-2.0 framework from LMSYS for serving and
  evaluating **LLM routers** — components that direct each incoming
  query to either a strong (expensive) or weak (cheap) model based on
  predicted quality. The framework ships several pre-trained routers
  (causal LLM, BERT, matrix factorization, similarity-weighted), a
  benchmark suite against MT-Bench and MMLU, and an
  OpenAI-compatible serving endpoint.

  In the atlas: RouteLLM is the canonical **cost-quality router**. It
  composes cleanly above LiteLLM (RouteLLM picks the model tier,
  LiteLLM dispatches it) and is the cleanest demonstration that
  model-tier choice can be a deterministic, evaluable component
  rather than a hard-coded `model:` parameter.
