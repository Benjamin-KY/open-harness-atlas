sovereignty_notes: 'Alibaba (company; Foundation Model Inference Team, CN) publishes RTP-LLM under Apache-2.0 — a CUDA-based LLM inference engine in production across Taobao, Tmall, Cainiao, Amap, Ele.me, AE, and Lazada, with PagedAttention / FlashAttention / FlashDecoding kernels, WeightOnly INT8/INT4 quantization (GPTQ/AWQ), adaptive KV cache, dynamic batching, and a 2025 prefill/decode separation pathway. Model-agnostic 3 is appropriate: the engine ingests HuggingFace weights (SafeTensors / Pytorch / Megatron) across many open model families and is a swap-target for local serving, though provider abstraction is at the weight-format layer rather than via an OpenAI-compatible router. Multi-hardware roadmap includes AMD ROCm, Intel CPU, ARM CPU.'
