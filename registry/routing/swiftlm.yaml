id: swiftlm
name: "Swiftlm"

category: routing
subcategory: local-inference-server

repo_url: https://github.com/SharpAI/SwiftLM
license: MIT
primary_language: Swift

tagline: "Native MLX-Swift LLM inference server for Apple Silicon — OpenAI + Anthropic API compatible."

description: |
  SwiftLM is a Swift-native (no Python) LLM inference server for Apple Silicon, built on MLX-Swift. Exposes both OpenAI and Anthropic-shape HTTP APIs and supports SSD streaming for large models that exceed RAM.

  In the atlas: the dual-API surface makes it interesting in routing patterns where downstream clients are split between the OpenAI and Anthropic SDKs — both can hit one local server.

