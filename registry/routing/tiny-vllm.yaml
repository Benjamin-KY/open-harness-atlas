sovereignty_notes: Jędrzej Maczan (jmaczan — community / individual, Poland) publishes tiny-vllm under Apache-2.0 as both a working C++/CUDA inference engine (Safetensors loader, full Llama 3.2 1B forward pass, KV cache, static + continuous batching, online softmax / FlashAttention-like attention, PagedAttention) and a long-form course that derives every kernel from scratch. Repositioned to `education / inference-tutorial` because the README's stated primary purpose is teaching ('use it as a learning tool…or as a teaching resource at your university'). Model-agnostic 3 default holds; for sovereignty, this is a useful reference for understanding what a vLLM-style server is doing under the hood.
