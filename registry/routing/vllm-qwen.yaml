sovereignty_notes: 'hec-ovi (community / individual) publishes vllm-qwen under the Unlicense — a thin Docker Compose wrapper that builds vLLM from source against a TheRock ROCm nightly to serve `Qwen/Qwen3.6-27B` (BF16, native 256K context, vision) on AMD Ryzen AI Max+ 395 ''Strix Halo'' (gfx1151, 128 GB UMA). Model-agnostic 4 reflects an OpenAI-compatible local-first endpoint that drops into anything OpenAI-shaped, though the only-supported configuration is the specific Strix Halo hardware. Honest disclosure flags: README links to a sibling `llama-qwen` repo with ~75% faster decode but no vision, and documents three known upstream vLLM tool-parser bugs.'
