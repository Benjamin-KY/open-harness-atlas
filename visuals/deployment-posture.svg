<title id="title">Deployment posture across the open-harness-atlas registry</title>
<desc id="desc">A stacked horizontal bar chart per category showing how 860 open-source harnesses split across five deployment postures (local-only, local-first, hybrid, cloud-first, api-only). Local-only is air-gappable; local-first means docker compose up works out of the box; hybrid requires both local and cloud at runtime by design; cloud-first means SaaS is the primary path; api-only means no local path exists.</desc>
