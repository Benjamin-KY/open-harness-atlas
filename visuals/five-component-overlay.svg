<title id="ovTitle">Five-component coverage — which OSS governance harnesses cover which Harmless Harnesses components</title>
<desc id="ovDesc">A 5-row by 6-column matrix mapping the five Harmless Harnesses components (policy router, source authority, prompt composer, output contract, audit-log FSM) to six representative open-source governance projects (guardrails-ai, nemo-guardrails, presidio, granite-guardian, rebuff, harmless-harnesses). Each cell is one of native, aligned, partial, or none — colour-coded and labelled.</desc>
